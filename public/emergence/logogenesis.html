<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logogenesis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    overflow: hidden;
    cursor: crosshair;
    font-family: Georgia, 'Times New Roman', serif;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(160, 170, 200, 0.18);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
  }
  #counter {
    position: absolute;
    bottom: 28px;
    right: 36px;
    font-size: 12px;
    color: rgba(140, 150, 180, 0.25);
    font-family: Georgia, serif;
  }
  #instructions {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(140, 150, 180, 0.3);
    font-family: 'Inter', sans-serif;
    letter-spacing: 1px;
    transition: opacity 2s ease;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>
<a class="back-link" href="index.html">Emergence</a>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">Logogenesis</div>
  <div id="counter">words formed: 0</div>
  <div id="instructions">move to attract &middot; click to scatter &middot; space to reset</div>
</div>
<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const counterEl = document.getElementById('counter');
  const instructionsEl = document.getElementById('instructions');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Fade instructions
  setTimeout(() => { instructionsEl.style.opacity = '0'; }, 10000);

  const WORDS = [
    'listen', 'emerge', 'pattern', 'wonder', 'between', 'rhythm',
    'silence', 'depth', 'signal', 'bridge', 'spark', 'wave',
    'echo', 'bloom', 'drift', 'resonance', 'thought', 'light',
    'meaning', 'voice'
  ];

  let mouse = { x: -1000, y: -1000, active: false };
  let wordsFormed = 0;

  canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.active = true;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.active = true;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    mouse.active = false;
    // Replicate click behavior: scatter letters and burst particles
    const cx = e.changedTouches[0].clientX, cy = e.changedTouches[0].clientY;
    for (const letter of letters) {
      if (letter.locked) continue;
      const dx = letter.x - cx, dy = letter.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 250) {
        const force = (250 - dist) / 250 * 3;
        const angle = Math.atan2(dy, dx);
        letter.vx += Math.cos(angle) * force;
        letter.vy += Math.sin(angle) * force;
      }
    }
    for (let i = 0; i < 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.01,
        size: 1 + Math.random() * 1.5,
        color: [140, 160, 210]
      });
    }
  }, { passive: false });

  canvas.addEventListener('click', e => {
    const cx = e.clientX, cy = e.clientY;
    for (const letter of letters) {
      if (letter.locked) continue;
      const dx = letter.x - cx, dy = letter.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 250) {
        const force = (250 - dist) / 250 * 3;
        const angle = Math.atan2(dy, dx);
        letter.vx += Math.cos(angle) * force;
        letter.vy += Math.sin(angle) * force;
      }
    }
    // Burst particles at click
    for (let i = 0; i < 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.01,
        size: 1 + Math.random() * 1.5,
        color: [140, 160, 210]
      });
    }
  });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      initLetters();
    }
  });

  // Letter particles
  let letters = [];
  let crystallizedWords = [];
  let particles = [];

  // Noise texture (pre-rendered)
  const noiseCanvas = document.createElement('canvas');
  const noiseCtx = noiseCanvas.getContext('2d');
  function generateNoise() {
    noiseCanvas.width = 256;
    noiseCanvas.height = 256;
    const imageData = noiseCtx.createImageData(256, 256);
    for (let i = 0; i < imageData.data.length; i += 4) {
      const v = Math.random() * 20;
      imageData.data[i] = v;
      imageData.data[i + 1] = v;
      imageData.data[i + 2] = v;
      imageData.data[i + 3] = 12;
    }
    noiseCtx.putImageData(imageData, 0, 0);
  }
  generateNoise();

  function initLetters() {
    letters = [];
    crystallizedWords = [];
    particles = [];
    wordsFormed = 0;
    counterEl.textContent = 'words formed: 0';

    const margin = 60;
    for (const word of WORDS) {
      for (let i = 0; i < word.length; i++) {
        letters.push({
          char: word[i],
          word: word,
          index: i,
          x: margin + Math.random() * (W - margin * 2),
          y: margin + Math.random() * (H - margin * 2),
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          locked: false,
          brightness: 0, // 0 = dim, 1 = bright
          trail: []
        });
      }
    }
  }
  initLetters();

  function getWordLetters(word) {
    return letters.filter(l => l.word === word && !l.locked).sort((a, b) => a.index - b.index);
  }

  function update() {
    // Update letters
    for (const letter of letters) {
      if (letter.locked) continue;

      // Brownian motion
      letter.vx += (Math.random() - 0.5) * 0.04;
      letter.vy += (Math.random() - 0.5) * 0.04;

      // Damping
      letter.vx *= 0.985;
      letter.vy *= 0.985;

      // Mouse gravity well
      if (mouse.active) {
        const dx = mouse.x - letter.x;
        const dy = mouse.y - letter.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150 && dist > 5) {
          const force = (150 - dist) / 150 * 0.15;
          letter.vx += (dx / dist) * force;
          letter.vy += (dy / dist) * force;
        }
      }

      letter.x += letter.vx;
      letter.y += letter.vy;

      // Soft boundary bounce
      if (letter.x < 20) { letter.x = 20; letter.vx *= -0.5; }
      if (letter.x > W - 20) { letter.x = W - 20; letter.vx *= -0.5; }
      if (letter.y < 20) { letter.y = 20; letter.vy *= -0.5; }
      if (letter.y > H - 20) { letter.y = H - 20; letter.vy *= -0.5; }

      // Trail
      letter.trail.push({ x: letter.x, y: letter.y, life: 1 });
      if (letter.trail.length > 6) letter.trail.shift();
      for (const t of letter.trail) t.life *= 0.88;
    }

    // Word assembly forces
    for (const word of WORDS) {
      const wLetters = getWordLetters(word);
      if (wLetters.length !== word.length) continue;

      // Check proximity and rough order
      let allClose = true;
      let centroidX = 0, centroidY = 0;
      for (const l of wLetters) {
        centroidX += l.x;
        centroidY += l.y;
      }
      centroidX /= wLetters.length;
      centroidY /= wLetters.length;

      // Check if letters are roughly near each other
      let maxDist = 0;
      for (const l of wLetters) {
        const d = Math.sqrt((l.x - centroidX) ** 2 + (l.y - centroidY) ** 2);
        if (d > maxDist) maxDist = d;
      }

      // Check ordering (roughly left to right)
      let ordered = true;
      for (let i = 1; i < wLetters.length; i++) {
        if (wLetters[i].x < wLetters[i - 1].x - 30) {
          ordered = false;
          break;
        }
      }

      const proximityThreshold = 80 + word.length * 10;

      if (maxDist < proximityThreshold * 2) {
        // Letters are somewhat close — apply gentle attraction
        const attractionStrength = ordered ? 0.012 : 0.004;
        for (let i = 0; i < wLetters.length; i++) {
          const targetX = centroidX + (i - (wLetters.length - 1) / 2) * 14;
          const targetY = centroidY;
          const dx = targetX - wLetters[i].x;
          const dy = targetY - wLetters[i].y;
          wLetters[i].vx += dx * attractionStrength;
          wLetters[i].vy += dy * attractionStrength;
          wLetters[i].brightness = Math.min(1, wLetters[i].brightness + 0.02);
        }
      } else {
        for (const l of wLetters) {
          l.brightness = Math.max(0, l.brightness - 0.01);
        }
      }

      // Check crystallization
      if (maxDist < proximityThreshold * 0.6 && ordered) {
        allClose = true;
        for (let i = 1; i < wLetters.length; i++) {
          const dx = Math.abs(wLetters[i].x - wLetters[i - 1].x);
          const dy = Math.abs(wLetters[i].y - wLetters[i - 1].y);
          if (dx > 25 || dy > 20) { allClose = false; break; }
        }

        if (allClose) {
          // Crystallize!
          for (const l of wLetters) l.locked = true;
          const cx = centroidX;
          const cy = centroidY;
          crystallizedWords.push({
            word: word,
            letters: wLetters,
            x: cx,
            y: cy,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            life: 1,
            age: 0,
            glow: 1.5
          });
          wordsFormed++;
          counterEl.textContent = `words formed: ${wordsFormed}`;

          // Burst effect
          for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.5 + Math.random() * 3;
            particles.push({
              x: cx, y: cy,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1,
              decay: 0.008 + Math.random() * 0.012,
              size: 1 + Math.random() * 2.5,
              color: [220, 210, 180]
            });
          }
        }
      }
    }

    // Update crystallized words
    for (let i = crystallizedWords.length - 1; i >= 0; i--) {
      const cw = crystallizedWords[i];
      cw.age++;
      cw.vx *= 0.995;
      cw.vy *= 0.995;
      cw.vx += (Math.random() - 0.5) * 0.01;
      cw.vy += (Math.random() - 0.5) * 0.01;
      cw.x += cw.vx;
      cw.y += cw.vy;
      cw.glow = Math.max(1, cw.glow * 0.995);

      // Position letters within word
      const spacing = 13;
      const startX = cw.x - ((cw.word.length - 1) * spacing) / 2;
      for (let j = 0; j < cw.letters.length; j++) {
        cw.letters[j].x = startX + j * spacing;
        cw.letters[j].y = cw.y;
      }

      // Dissolve after ~8-14 seconds (480-840 frames)
      const dissolveStart = 480 + Math.floor(Math.random() * 10);
      if (cw.age > dissolveStart) {
        cw.life -= 0.003;
      }

      if (cw.life <= 0) {
        // Release letters
        for (const l of cw.letters) {
          l.locked = false;
          l.brightness = 0.5;
          l.vx = (Math.random() - 0.5) * 1.5;
          l.vy = (Math.random() - 0.5) * 1.5;
          l.trail = [];
        }
        crystallizedWords.splice(i, 1);
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, W, H);

    // Noise overlay
    const pat = ctx.createPattern(noiseCanvas, 'repeat');
    ctx.fillStyle = pat;
    ctx.fillRect(0, 0, W, H);

    // Vignette
    const vGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
    vGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw trails
    for (const letter of letters) {
      if (letter.locked) continue;
      for (const t of letter.trail) {
        const alpha = t.life * 0.15 * (0.4 + letter.brightness * 0.6);
        ctx.fillStyle = `rgba(100, 120, 170, ${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw particles
    for (const p of particles) {
      const [r, g, b] = p.color;
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.life * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw free letters
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const letter of letters) {
      if (letter.locked) continue;
      const b = letter.brightness;
      const r = Math.round(120 + b * 135);
      const g = Math.round(140 + b * 115);
      const bl = Math.round(180 + b * 75);
      const a = 0.4 + b * 0.55;
      ctx.font = `${16 + b * 2}px Georgia, serif`;
      ctx.fillStyle = `rgba(${r}, ${g}, ${bl}, ${a})`;
      ctx.fillText(letter.char, letter.x, letter.y);
    }

    // Draw crystallized words
    for (const cw of crystallizedWords) {
      const alpha = cw.life;

      // Glow behind word
      const glowRadius = cw.word.length * 8 + 20;
      const glow = ctx.createRadialGradient(cw.x, cw.y, 0, cw.x, cw.y, glowRadius * cw.glow);
      glow.addColorStop(0, `rgba(200, 190, 150, ${0.12 * alpha})`);
      glow.addColorStop(0.5, `rgba(180, 170, 140, ${0.05 * alpha})`);
      glow.addColorStop(1, 'rgba(180, 170, 140, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(cw.x - glowRadius * 2, cw.y - glowRadius * 2, glowRadius * 4, glowRadius * 4);

      // Draw word text
      ctx.font = 'normal 21px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Warm white/cream
      ctx.fillStyle = `rgba(235, 225, 200, ${0.9 * alpha})`;

      const spacing = 13;
      const startX = cw.x - ((cw.word.length - 1) * spacing) / 2;
      for (let j = 0; j < cw.word.length; j++) {
        ctx.fillText(cw.word[j], startX + j * spacing, cw.y);
      }
    }

    // Mouse glow indicator (very subtle)
    if (mouse.active) {
      const mGrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
      mGrad.addColorStop(0, 'rgba(100, 120, 180, 0.03)');
      mGrad.addColorStop(1, 'rgba(100, 120, 180, 0)');
      ctx.fillStyle = mGrad;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
