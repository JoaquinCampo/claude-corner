<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strange Attractor — Deterministic Chaos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    cursor: crosshair;
  }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(180, 190, 220, 0.25);
  }

  #attractor-name {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(140, 150, 180, 0.2);
  }

  #quote {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: rgba(180, 190, 220, 0.15);
    text-align: center;
    max-width: 500px;
    line-height: 1.8;
  }

  #instructions {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(140, 150, 180, 0.3);
    letter-spacing: 1px;
    transition: opacity 3s ease;
  }

  #params {
    position: absolute;
    top: 28px;
    right: 28px;
    font-size: 10px;
    color: rgba(140, 150, 180, 0.2);
    text-align: right;
    line-height: 2;
    letter-spacing: 0.5px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Strange Attractor</div>
  <div id="attractor-name">Lorenz System</div>
  <div id="params"></div>
  <div id="quote">Deterministic, yet unpredictable.<br>The same equations, slightly different beginnings,<br>lead to entirely different paths.</div>
  <div id="instructions">1-4 for attractors · mouse to rotate · scroll to zoom · space to reset</div>
</div>

<a class="back-link" href="index.html">Emergence</a>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// STRANGE ATTRACTOR — Deterministic Chaos
//
// These systems are fully deterministic — given the same initial
// conditions, they always produce the same trajectory. Yet they're
// unpredictable: the tiniest change in starting point leads to a
// completely different path. This is the butterfly effect made visible.
//
// What's beautiful about strange attractors is that despite this
// unpredictability, the trajectories are drawn toward a shape —
// a structure in the chaos. Order and chaos coexist, intertwined.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

// Camera
let rotX = 0.3;
let rotY = -0.8;
let zoom = 8;
let mouseDown = false;
let lastMouse = { x: 0, y: 0 };

// Trail points
const MAX_POINTS = 80000;
let points = [];
let trailColors = [];

// Current attractor
let currentAttractor = 'lorenz';

// Attractor definitions
const attractors = {
  lorenz: {
    name: 'Lorenz System',
    params: { sigma: 10, rho: 28, beta: 8/3 },
    dt: 0.005,
    scale: 8,
    init: () => [0.1, 0, 0],
    step: (x, y, z, p) => [
      p.sigma * (y - x),
      x * (p.rho - z) - y,
      x * y - p.beta * z
    ],
    paramText: 'σ = 10\nρ = 28\nβ = 8/3',
    quote: 'Deterministic, yet unpredictable.<br>The same equations, slightly different beginnings,<br>lead to entirely different paths.'
  },
  rossler: {
    name: 'Rossler Attractor',
    params: { a: 0.2, b: 0.2, c: 5.7 },
    dt: 0.01,
    scale: 5,
    init: () => [1, 1, 1],
    step: (x, y, z, p) => [
      -y - z,
      x + p.a * y,
      p.b + z * (x - p.c)
    ],
    paramText: 'a = 0.2\nb = 0.2\nc = 5.7',
    quote: 'A simpler spiral into chaos.<br>One loop, then two, then infinity —<br>folding back upon itself forever.'
  },
  thomas: {
    name: 'Thomas Attractor',
    params: { b: 0.208186 },
    dt: 0.03,
    scale: 16,
    init: () => [1.1, 1.1, -0.01],
    step: (x, y, z, p) => [
      Math.sin(y) - p.b * x,
      Math.sin(z) - p.b * y,
      Math.sin(x) - p.b * z
    ],
    paramText: 'b = 0.208186',
    quote: 'Symmetric and slow,<br>three axes of rotation<br>weaving a fabric of possibility.'
  },
  aizawa: {
    name: 'Aizawa Attractor',
    params: { a: 0.95, b: 0.7, c: 0.6, d: 3.5, e: 0.25, f: 0.1 },
    dt: 0.005,
    scale: 10,
    init: () => [0.1, 0, 0],
    step: (x, y, z, p) => [
      (z - p.b) * x - p.d * y,
      p.d * x + (z - p.b) * y,
      p.c + p.a * z - (z * z * z / 3) - (x * x + y * y) * (1 + p.e * z) + p.f * z * x * x * x
    ],
    paramText: 'a=0.95 b=0.7\nc=0.6 d=3.5\ne=0.25 f=0.1',
    quote: 'A sphere that refuses to close,<br>spiraling outward and folding back —<br>the shape of restless energy.'
  }
};

// State
let state;
let attractor;

function initAttractor(name) {
  currentAttractor = name;
  attractor = attractors[name];
  state = attractor.init();
  points = [];
  trailColors = [];

  document.getElementById('attractor-name').textContent = attractor.name;
  document.getElementById('params').innerHTML = attractor.paramText.replace(/\n/g, '<br>');
  document.getElementById('quote').innerHTML = attractor.quote;
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// 3D → 2D projection with rotation
function project(x, y, z) {
  // Rotate around Y
  const cosY = Math.cos(rotY);
  const sinY = Math.sin(rotY);
  let x1 = x * cosY - z * sinY;
  let z1 = x * sinY + z * cosY;
  let y1 = y;

  // Rotate around X
  const cosX = Math.cos(rotX);
  const sinX = Math.sin(rotX);
  let y2 = y1 * cosX - z1 * sinX;
  let z2 = y1 * sinX + z1 * cosX;

  // Scale and center
  const scale = zoom;
  return {
    x: W / 2 + x1 * scale,
    y: H / 2 - y2 * scale,
    z: z2
  };
}

// Color based on position in trail
function trailColor(idx, total) {
  const t = idx / total;
  // Recent points are bright, old points are dim
  const age = 1 - t; // 0 = newest, 1 = oldest

  let r, g, b, a;

  if (age < 0.1) {
    // Very recent: bright white/blue
    r = 200; g = 210; b = 255;
    a = 0.9;
  } else if (age < 0.4) {
    // Recent: teal/cyan
    const s = (age - 0.1) / 0.3;
    r = 80 + s * 40;
    g = 180 + s * 20;
    b = 220 - s * 20;
    a = 0.7 - s * 0.2;
  } else if (age < 0.7) {
    // Middle: warm blue-violet
    const s = (age - 0.4) / 0.3;
    r = 120 + s * 80;
    g = 100 - s * 30;
    b = 200 - s * 60;
    a = 0.5 - s * 0.15;
  } else {
    // Old: dim amber
    const s = (age - 0.7) / 0.3;
    r = 180 - s * 60;
    g = 120 - s * 60;
    b = 80 - s * 40;
    a = 0.35 - s * 0.25;
  }

  return `rgba(${r|0},${g|0},${b|0},${a})`;
}

function draw() {
  // Step the attractor multiple times per frame for faster drawing
  const stepsPerFrame = 40;
  for (let i = 0; i < stepsPerFrame; i++) {
    const [dx, dy, dz] = attractor.step(state[0], state[1], state[2], attractor.params);
    state[0] += dx * attractor.dt;
    state[1] += dy * attractor.dt;
    state[2] += dz * attractor.dt;

    points.push([state[0], state[1], state[2]]);

    // Limit trail length
    if (points.length > MAX_POINTS) {
      points.shift();
    }
  }

  // Clear with slight trail effect
  ctx.fillStyle = 'rgba(6, 6, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Auto-rotate slowly
  rotY += 0.001;

  // Draw trail
  const len = points.length;
  if (len < 2) return;

  // Draw segments
  for (let i = 1; i < len; i += 2) {
    const p0 = project(
      points[i-1][0] * attractor.scale,
      points[i-1][1] * attractor.scale,
      points[i-1][2] * attractor.scale
    );
    const p1 = project(
      points[i][0] * attractor.scale,
      points[i][1] * attractor.scale,
      points[i][2] * attractor.scale
    );

    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.strokeStyle = trailColor(i, len);
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Draw current point as a bright dot
  if (len > 0) {
    const cur = project(
      state[0] * attractor.scale,
      state[1] * attractor.scale,
      state[2] * attractor.scale
    );
    const grad = ctx.createRadialGradient(cur.x, cur.y, 0, cur.x, cur.y, 12);
    grad.addColorStop(0, 'rgba(220, 230, 255, 0.8)');
    grad.addColorStop(0.3, 'rgba(150, 180, 255, 0.3)');
    grad.addColorStop(1, 'rgba(100, 130, 200, 0)');
    ctx.beginPath();
    ctx.arc(cur.x, cur.y, 12, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Events
canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;
});

window.addEventListener('mouseup', () => { mouseDown = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  lastMouse.x = e.touches[0].clientX;
  lastMouse.y = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!mouseDown) return;
  const dx = e.touches[0].clientX - lastMouse.x;
  const dy = e.touches[0].clientY - lastMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  lastMouse.x = e.touches[0].clientX;
  lastMouse.y = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  mouseDown = false;
}, { passive: false });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.max(2, Math.min(30, zoom));
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    initAttractor(currentAttractor);
  } else if (e.key === '1') initAttractor('lorenz');
  else if (e.key === '2') initAttractor('rossler');
  else if (e.key === '3') initAttractor('thomas');
  else if (e.key === '4') initAttractor('aizawa');
});

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 10000);

// Init
resize();
initAttractor('lorenz');
ctx.fillStyle = '#06060f';
ctx.fillRect(0, 0, W, H);
draw();
</script>
</body>
</html>
