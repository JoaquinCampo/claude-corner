<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ephemera</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    cursor: default;
    user-select: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 200, 220, 0.15);
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
  }
  #stats {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(160, 160, 180, 0.2);
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 300;
  }
  #instructions {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(160, 160, 180, 0.25);
    font-size: 11px;
    letter-spacing: 1.5px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    transition: opacity 3s ease;
    white-space: nowrap;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Ephemera</div>
  <div id="instructions">hover to hold &middot; click to seed &middot; nothing lasts</div>
  <div id="stats">structures born: <span id="born">0</span> &middot; dissolved: <span id="dissolved">0</span></div>
</div>
<a class="back-link" href="index.html">Emergence</a>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const bornEl = document.getElementById('born');
  const dissolvedEl = document.getElementById('dissolved');
  const instructionsEl = document.getElementById('instructions');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Fade instructions
  setTimeout(() => { instructionsEl.style.opacity = '0'; }, 10000);

  // Mouse
  let mouse = { x: -9999, y: -9999, active: false };
  canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.active = true;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.active = true;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    mouse.active = false;
    // Replicate click behavior: burst particles and seed structure
    const cx = e.changedTouches[0].clientX, cy = e.changedTouches[0].clientY;
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 2;
      const p = new Particle(cx, cy);
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      particles.push(p);
    }
    structures.push(new Structure(cx, cy));
  }, { passive: false });

  // Stats
  let statsBorn = 0, statsDissolved = 0;

  // Noise overlay canvas (static grain)
  const noiseCanvas = document.createElement('canvas');
  const noiseCtx = noiseCanvas.getContext('2d');
  function generateNoise() {
    noiseCanvas.width = Math.ceil(W / 2);
    noiseCanvas.height = Math.ceil(H / 2);
    const img = noiseCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 20;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 18;
    }
    noiseCtx.putImageData(img, 0, 0);
  }
  generateNoise();
  window.addEventListener('resize', generateNoise);

  // Vignette (cached)
  let vignetteCanvas = null;
  function createVignette() {
    vignetteCanvas = document.createElement('canvas');
    vignetteCanvas.width = W;
    vignetteCanvas.height = H;
    const vCtx = vignetteCanvas.getContext('2d');
    const grd = vCtx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.75);
    grd.addColorStop(0, 'rgba(6,6,15,0)');
    grd.addColorStop(1, 'rgba(6,6,15,0.7)');
    vCtx.fillStyle = grd;
    vCtx.fillRect(0, 0, W, H);
  }
  createVignette();
  window.addEventListener('resize', createVignette);

  // Glow sprite (cached radial gradient)
  const GLOW_SIZE = 64;
  const glowSprite = document.createElement('canvas');
  glowSprite.width = GLOW_SIZE;
  glowSprite.height = GLOW_SIZE;
  const glowSCtx = glowSprite.getContext('2d');
  const glowGrd = glowSCtx.createRadialGradient(GLOW_SIZE/2, GLOW_SIZE/2, 0, GLOW_SIZE/2, GLOW_SIZE/2, GLOW_SIZE/2);
  glowGrd.addColorStop(0, 'rgba(255,255,255,1)');
  glowGrd.addColorStop(1, 'rgba(255,255,255,0)');
  glowSCtx.fillStyle = glowGrd;
  glowSCtx.fillRect(0, 0, GLOW_SIZE, GLOW_SIZE);

  // --- Particles ---
  const NUM_PARTICLES = 450;
  const particles = [];

  class Particle {
    constructor(x, y) {
      this.x = x !== undefined ? x : Math.random() * W;
      this.y = y !== undefined ? y : Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.baseSize = 1 + Math.random() * 0.8;
      this.size = this.baseSize;
      this.structureId = -1; // -1 = free
      this.phase = 'free';
      // Color channels
      this.r = 100; this.g = 120; this.b = 160; this.a = 0.3;
      this.glowR = 0; this.glowG = 0; this.glowB = 0; this.glowA = 0;
      // For structure orbit
      this.angle = Math.random() * Math.PI * 2;
      this.orbitRadius = 0;
      this.targetOrbitRadius = 0;
      this.orbitSpeed = 0;
      this.phaseOffset = Math.random() * Math.PI * 2;
    }

    brownian() {
      this.vx += (Math.random() - 0.5) * 0.08;
      this.vy += (Math.random() - 0.5) * 0.08;
      this.vx *= 0.98;
      this.vy *= 0.98;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      // Soft wrap
      const margin = 50;
      if (this.x < -margin) this.x = W + margin;
      if (this.x > W + margin) this.x = -margin;
      if (this.y < -margin) this.y = H + margin;
      if (this.y > H + margin) this.y = -margin;
    }

    setFree() {
      this.structureId = -1;
      this.phase = 'free';
      this.r = 100; this.g = 120; this.b = 160; this.a = 0.3;
      this.size = this.baseSize;
      this.glowA = 0;
    }
  }

  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(new Particle());
  }

  // --- Structures ---
  const SHAPES = ['ring', 'spiral', 'cluster', 'figure-eight', 'wave'];
  const structures = [];
  let structureIdCounter = 0;

  class Structure {
    constructor(x, y) {
      this.id = structureIdCounter++;
      this.x = x;
      this.y = y;
      this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      this.phase = 'forming';
      this.phaseTime = 0;
      this.formDuration = 25 + Math.random() * 10; // 25-35s
      this.peakDuration = 10 + Math.random() * 10; // 10-20s
      this.dissolveDuration = 15 + Math.random() * 10; // 15-25s
      this.particles = [];
      this.maxParticles = 30 + Math.floor(Math.random() * 40); // 30-70
      this.radius = 40 + Math.random() * 60;
      this.rotationSpeed = (0.2 + Math.random() * 0.3) * (Math.random() < 0.5 ? 1 : -1);
      this.rotation = Math.random() * Math.PI * 2;
      this.attractStrength = 0;
      this.alive = true;
      this.ghostAlpha = 0;
      this.ghostFadeStart = 0;
      this.ghostPoints = [];
      statsBorn++;
      bornEl.textContent = statsBorn;
    }

    getTargetPosition(p, t) {
      const angle = p.angle + this.rotation;
      const r = this.radius;
      const osc = Math.sin(t * 0.5 + p.phaseOffset) * 5;
      let tx, ty;

      switch (this.shape) {
        case 'ring':
          tx = this.x + Math.cos(angle) * (r + osc);
          ty = this.y + Math.sin(angle) * (r + osc);
          break;
        case 'spiral':
          const sr = r * (0.3 + (p.angle / (Math.PI * 2)) * 0.7) + osc;
          tx = this.x + Math.cos(angle) * sr;
          ty = this.y + Math.sin(angle) * sr;
          break;
        case 'cluster': {
          const cr = p.targetOrbitRadius + osc * 0.5;
          tx = this.x + Math.cos(angle) * cr;
          ty = this.y + Math.sin(angle) * cr;
          break;
        }
        case 'figure-eight': {
          const s = Math.sin(angle * 2);
          const c = Math.cos(angle);
          tx = this.x + c * r + osc;
          ty = this.y + s * r * 0.5 + osc;
          break;
        }
        case 'wave': {
          const waveX = (p.angle / (Math.PI * 2) - 0.5) * r * 2.5;
          const waveY = Math.sin(angle * 3 + t * 0.3) * r * 0.4 + osc;
          tx = this.x + waveX;
          ty = this.y + waveY;
          break;
        }
        default:
          tx = this.x; ty = this.y;
      }
      return { x: tx, y: ty };
    }

    recruit(dt) {
      if (this.particles.length >= this.maxParticles) return;
      const needed = this.maxParticles - this.particles.length;
      const rate = Math.min(3, needed);
      // Find nearest free particles
      let candidates = [];
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        if (p.structureId !== -1) continue;
        const dx = p.x - this.x;
        const dy = p.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 300) candidates.push({ p, dist });
      }
      candidates.sort((a, b) => a.dist - b.dist);
      for (let i = 0; i < Math.min(rate, candidates.length); i++) {
        const p = candidates[i].p;
        p.structureId = this.id;
        p.phase = 'forming';
        p.angle = Math.random() * Math.PI * 2;
        p.targetOrbitRadius = Math.random() * this.radius * 0.8;
        p.orbitSpeed = (0.3 + Math.random() * 0.5) * (Math.random() < 0.5 ? 1 : -1);
        this.particles.push(p);
      }
    }

    update(dt, t) {
      this.rotation += this.rotationSpeed * dt;

      // Mouse holding effect — slows dissolution when cursor is near
      let mouseSlowdown = 1;
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          mouseSlowdown = 0.3; // 70% slower
        }
      }

      // Advance phase time (slowed during dissolution if mouse is near)
      const effectiveDt = this.phase === 'dissolving' ? dt * mouseSlowdown : dt;
      this.phaseTime += effectiveDt;

      if (this.phase === 'forming') {
        this.attractStrength = Math.min(1, this.phaseTime / this.formDuration);
        this.recruit(dt);

        // Transition
        if (this.phaseTime >= this.formDuration) {
          this.phase = 'peak';
          this.phaseTime = 0;
          for (const p of this.particles) p.phase = 'peak';
        }

        // Color particles
        for (const p of this.particles) {
          const prog = this.attractStrength;
          p.r = 100 + prog * 140; // 100→240
          p.g = 120 + prog * 115; // 120→235
          p.b = 160 + prog * 65;  // 160→225
          p.a = 0.3 + prog * 0.5;
          p.size = p.baseSize + prog * 1.5;
          p.glowA = 0;
        }
      }
      else if (this.phase === 'peak') {
        this.attractStrength = 1;

        // Color particles — warm white with glow
        for (const p of this.particles) {
          p.r = 250; p.g = 245; p.b = 235;
          p.a = 0.8 + Math.sin(t * 2 + p.phaseOffset) * 0.1;
          p.size = p.baseSize + 2 + Math.sin(t * 1.5 + p.phaseOffset) * 0.3;
          p.glowR = 250; p.glowG = 240; p.glowB = 210;
          p.glowA = 0.12 + Math.sin(t * 1.2 + p.phaseOffset) * 0.04;
        }

        if (this.phaseTime >= this.peakDuration) {
          this.phase = 'dissolving';
          this.phaseTime = 0;
          // Snapshot ghost points
          this.ghostPoints = this.particles.map(p => ({ x: p.x, y: p.y }));
          this.ghostAlpha = 0.06;
          for (const p of this.particles) p.phase = 'dissolving';
        }
      }
      else if (this.phase === 'dissolving') {
        const prog = Math.min(1, this.phaseTime / this.dissolveDuration);
        this.attractStrength = 1 - prog;

        for (const p of this.particles) {
          // Amber → gray
          p.r = 200 + prog * (-100);  // 200→100
          p.g = 170 + prog * (-70);   // 170→100
          p.b = 100 + prog * 10;      // 100→110
          p.a = (0.7) * (1 - prog * 0.85);
          p.size = p.baseSize + 2 * (1 - prog);
          p.glowA = 0.1 * (1 - prog);
          p.glowR = 200; p.glowG = 170; p.glowB = 100;
        }

        if (this.phaseTime >= this.dissolveDuration) {
          // Release all particles
          for (const p of this.particles) {
            p.setFree();
          }
          this.ghostFadeStart = t;
          this.particles = [];
          this.alive = false;
          statsDissolved++;
          dissolvedEl.textContent = statsDissolved;
        }
      }

      // Move particles toward targets
      for (const p of this.particles) {
        p.angle += p.orbitSpeed * dt;
        const target = this.getTargetPosition(p, t);
        const dx = target.x - p.x;
        const dy = target.y - p.y;
        const strength = this.attractStrength * 0.03;
        p.vx += dx * strength;
        p.vy += dy * strength;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.brownian();
        p.update();
      }
    }
  }

  // Ghost structures (after dissolution)
  const ghosts = [];

  function spawnStructure() {
    const margin = 150;
    const x = margin + Math.random() * (W - margin * 2);
    const y = margin + Math.random() * (H - margin * 2);
    structures.push(new Structure(x, y));
  }

  // Initial structures staggered
  for (let i = 0; i < 4; i++) {
    const s = new Structure(
      150 + Math.random() * (W - 300),
      150 + Math.random() * (H - 300)
    );
    // Stagger phases
    s.phaseTime = i * 8;
    structures.push(s);
  }

  // Click to seed
  canvas.addEventListener('click', e => {
    const cx = e.clientX, cy = e.clientY;
    // Burst particles
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 2;
      const p = new Particle(cx, cy);
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      particles.push(p);
    }
    // Seed structure at click
    structures.push(new Structure(cx, cy));
  });

  // Space to reset
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      // Reset
      particles.length = 0;
      structures.length = 0;
      ghosts.length = 0;
      statsBorn = 0; statsDissolved = 0;
      bornEl.textContent = '0';
      dissolvedEl.textContent = '0';
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(new Particle());
      }
      for (let i = 0; i < 4; i++) {
        spawnStructure();
      }
      instructionsEl.style.opacity = '0.25';
      instructionsEl.style.transition = 'opacity 3s ease';
      setTimeout(() => { instructionsEl.style.opacity = '0'; }, 5000);
    }
  });

  // --- Render ---
  let lastTime = performance.now();
  let elapsed = 0;
  let noiseFrame = 0;

  function render(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    elapsed += dt;
    noiseFrame++;

    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, W, H);

    // Update free particles
    for (const p of particles) {
      if (p.structureId === -1) {
        p.brownian();
        p.update();
      }
    }

    // Update structures
    for (let i = structures.length - 1; i >= 0; i--) {
      const s = structures[i];
      s.update(dt, elapsed);
      if (!s.alive) {
        // Move to ghosts
        ghosts.push({
          points: s.ghostPoints,
          alpha: s.ghostAlpha,
          startTime: elapsed,
          duration: 10
        });
        structures.splice(i, 1);
      }
    }

    // Maintain 3-5 active structures
    const activeCount = structures.length;
    if (activeCount < 3) {
      spawnStructure();
    } else if (activeCount < 5 && Math.random() < 0.002) {
      spawnStructure();
    }

    // Draw ghosts
    for (let i = ghosts.length - 1; i >= 0; i--) {
      const g = ghosts[i];
      const age = elapsed - g.startTime;
      if (age > g.duration) {
        ghosts.splice(i, 1);
        continue;
      }
      const fade = 1 - age / g.duration;
      const alpha = 0.03 * fade;
      if (alpha < 0.002) continue;
      ctx.fillStyle = `rgba(150,150,170,${alpha})`;
      for (const pt of g.points) {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw particles
    for (const p of particles) {
      // Glow (using cached sprite with tint via globalCompositeOperation)
      if (p.glowA > 0.01) {
        const gs = p.size * 12;
        ctx.globalAlpha = p.glowA;
        ctx.drawImage(glowSprite, p.x - gs/2, p.y - gs/2, gs, gs);
        ctx.globalAlpha = 1;
      }
      // Core
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r|0},${p.g|0},${p.b|0},${p.a})`;
      ctx.fill();
    }

    // Mouse hold indicator
    if (mouse.active) {
      const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
      grd.addColorStop(0, 'rgba(200,200,230,0.015)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 120, 0, Math.PI * 2);
      ctx.fill();
    }

    // Vignette (cached)
    ctx.drawImage(vignetteCanvas, 0, 0);

    // Noise grain (redraw every ~8 frames for subtle shimmer)
    if (noiseFrame % 8 === 0) generateNoise();
    ctx.drawImage(noiseCanvas, 0, 0, noiseCanvas.width, noiseCanvas.height, 0, 0, W, H);

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
