<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langton's Ant — Two Rules, One Mystery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(180,190,220,0.2);
  }
  #rules {
    position: absolute; top: 28px; right: 28px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; color: rgba(140,150,180,0.2);
    text-align: right; line-height: 2;
  }
  #step-count {
    position: absolute; top: 28px; left: 28px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; color: rgba(140,150,180,0.2);
    line-height: 2;
  }
  #phase {
    position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300;
    color: rgba(180,190,220,0.35); letter-spacing: 2px;
    transition: color 1s ease, opacity 1s ease;
  }
  #instructions {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(140,150,180,0.3);
    letter-spacing: 1px; transition: opacity 3s ease;
    white-space: nowrap;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<a class="back-link" href="index.html">Emergence</a>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Langton's Ant</div>
  <div id="rules">
    white → turn right, flip, move<br>
    black → turn left, flip, move
  </div>
  <div id="step-count">step 0</div>
  <div id="phase">Simplicity</div>
  <div id="instructions">click to place ant · space to reset · up/down for speed · 1-3 for variants</div>
</div>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// LANGTON'S ANT — Two Rules, One Mystery
//
// An ant walks on a grid. On a white cell, it turns right,
// flips the cell to black, and moves forward. On a black cell,
// it turns left, flips the cell to white, and moves forward.
//
// Two rules. Nothing else.
//
// For about 10,000 steps, the ant wanders chaotically, creating
// a messy asymmetric blob. Then — suddenly, with no warning and
// no explanation — it begins building a perfect diagonal highway.
// An infinite, repeating pattern. Order from chaos.
//
// No one has proven why this happens. It's one of the simplest
// unsolved problems in mathematics. Two rules, and we still
// don't understand what they do.
//
// If emergence had a poster child, this would be it.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stepEl = document.getElementById('step-count');
const phaseEl = document.getElementById('phase');

let W, H;
const CELL_SIZE = 3;
let cols, rows;
let grid;         // Uint8Array: 0=white, 1+=colored states
let antX, antY, antDir; // direction: 0=up, 1=right, 2=down, 3=left
let steps = 0;
let speed = 25;   // steps per frame
let running = true;
let imageData;
let currentVariant = 0;

// Trail ring buffer — stores recent ant positions for glow effect
const TRAIL_LEN = 120;
let trail = [];
let trailIdx = 0;

// Variants: each is a rule string where R=right, L=left
// The classic ant is "RL" (2 colors)
// Extended ants use more colors and create different patterns
const variants = [
  { name: 'Classic',    rule: 'RL',     desc: 'white → turn right, flip, move\nblack → turn left, flip, move' },
  { name: 'Highway',    rule: 'RLR',    desc: 'Three-state variant\nForms highways faster' },
  { name: 'Symmetric',  rule: 'LLRR',   desc: 'Four-state variant\nCreates symmetric growth' },
];

// Color palettes for multi-state ants
// State 0 is always the background (dark)
function stateColor(state, numStates) {
  if (state === 0) return [6, 6, 15];

  // For 2-state ant: single visible color
  if (numStates === 2) return [50, 100, 200];

  const t = (state - 1) / Math.max(1, numStates - 2);

  // Deep blue → teal → gold → amber
  let r, g, b;
  if (t < 0.33) {
    const s = t / 0.33;
    r = 40 + s * 40;
    g = 80 + s * 80;
    b = 160 + s * 30;
  } else if (t < 0.66) {
    const s = (t - 0.33) / 0.33;
    r = 80 + s * 100;
    g = 160 + s * 30;
    b = 190 - s * 80;
  } else {
    const s = (t - 0.66) / 0.34;
    r = 180 + s * 40;
    g = 190 - s * 50;
    b = 110 - s * 50;
  }
  return [r | 0, g | 0, b | 0];
}

// Precomputed color LUTs for each variant
let colorLUT;

function buildColorLUT() {
  const rule = variants[currentVariant].rule;
  const numStates = rule.length;
  colorLUT = new Array(numStates);
  for (let i = 0; i < numStates; i++) {
    colorLUT[i] = stateColor(i, numStates);
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.floor(W / CELL_SIZE);
  rows = Math.floor(H / CELL_SIZE);
  reset();
}

function reset() {
  grid = new Uint8Array(cols * rows);
  antX = Math.floor(cols / 2);
  antY = Math.floor(rows / 2);
  antDir = 0; // facing up
  steps = 0;
  trail = [];
  trailIdx = 0;

  buildColorLUT();

  // Initialize image data with background
  imageData = ctx.createImageData(W, H);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    data[i]     = 6;
    data[i + 1] = 6;
    data[i + 2] = 15;
    data[i + 3] = 255;
  }

  // Update UI
  document.getElementById('rules').innerHTML =
    variants[currentVariant].desc.replace(/\n/g, '<br>');
  stepEl.textContent = 'step 0';
  phaseEl.textContent = 'Simplicity';
  phaseEl.style.color = 'rgba(180,190,220,0.35)';
}

function stepAnt() {
  const rule = variants[currentVariant].rule;
  const numStates = rule.length;
  const idx = antY * cols + antX;
  const state = grid[idx];

  // Turn based on rule
  if (rule[state] === 'R') {
    antDir = (antDir + 1) % 4; // turn right
  } else {
    antDir = (antDir + 3) % 4; // turn left
  }

  // Advance state (cycle through colors)
  const newState = (state + 1) % numStates;
  grid[idx] = newState;

  // Paint this cell
  const color = colorLUT[newState];
  const px = antX * CELL_SIZE;
  const py = antY * CELL_SIZE;
  const data = imageData.data;

  for (let dy = 0; dy < CELL_SIZE && py + dy < H; dy++) {
    for (let dx = 0; dx < CELL_SIZE && px + dx < W; dx++) {
      const pidx = ((py + dy) * W + (px + dx)) * 4;
      data[pidx]     = color[0];
      data[pidx + 1] = color[1];
      data[pidx + 2] = color[2];
    }
  }

  // Record trail position (pixel coordinates)
  if (trail.length < TRAIL_LEN) {
    trail.push({ x: antX * CELL_SIZE + CELL_SIZE / 2, y: antY * CELL_SIZE + CELL_SIZE / 2 });
  } else {
    trail[trailIdx] = { x: antX * CELL_SIZE + CELL_SIZE / 2, y: antY * CELL_SIZE + CELL_SIZE / 2 };
    trailIdx = (trailIdx + 1) % TRAIL_LEN;
  }

  // Move forward
  switch (antDir) {
    case 0: antY--; break; // up
    case 1: antX++; break; // right
    case 2: antY++; break; // down
    case 3: antX--; break; // left
  }

  // Wrap around (toroidal)
  if (antX < 0) antX += cols;
  if (antX >= cols) antX -= cols;
  if (antY < 0) antY += rows;
  if (antY >= rows) antY -= rows;

  steps++;
}

function updatePhase() {
  // Classic ant phases
  if (currentVariant === 0) {
    if (steps < 500) {
      phaseEl.textContent = 'Simplicity';
      phaseEl.style.color = 'rgba(100,140,200,0.4)';
    } else if (steps < 9500) {
      phaseEl.textContent = 'Chaos';
      phaseEl.style.color = 'rgba(200,120,100,0.4)';
    } else if (steps < 10500) {
      phaseEl.textContent = 'Something is happening...';
      phaseEl.style.color = 'rgba(200,180,100,0.5)';
    } else {
      phaseEl.textContent = 'The Highway';
      phaseEl.style.color = 'rgba(201,169,98,0.5)';
    }
  } else {
    if (steps < 500) {
      phaseEl.textContent = 'Beginning';
      phaseEl.style.color = 'rgba(100,140,200,0.4)';
    } else if (steps < 5000) {
      phaseEl.textContent = 'Evolving';
      phaseEl.style.color = 'rgba(160,140,200,0.4)';
    } else {
      phaseEl.textContent = 'Emergent';
      phaseEl.style.color = 'rgba(201,169,98,0.45)';
    }
  }
}

function drawAnt() {
  // Draw trail — fading glow along recent path
  const len = trail.length;
  if (len > 1) {
    for (let i = 0; i < len; i++) {
      // Recency: 1 = newest, 0 = oldest
      let recency;
      if (len < TRAIL_LEN) {
        recency = i / (len - 1); // linear: 0=first(oldest), 1=last(newest)
      } else {
        // Ring buffer: trailIdx points to next write slot (= oldest entry)
        const stepsAgo = ((trailIdx - 1 - i + len) % len);
        recency = 1 - stepsAgo / (len - 1);
      }
      if (recency < 0.05) continue;

      const t = trail[i];
      const alpha = recency * recency * 0.15;
      ctx.beginPath();
      ctx.arc(t.x, t.y, CELL_SIZE * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 98, ${alpha})`;
      ctx.fill();
    }
  }

  // Draw the ant as a bright dot
  const px = antX * CELL_SIZE + CELL_SIZE / 2;
  const py = antY * CELL_SIZE + CELL_SIZE / 2;

  // Glow
  ctx.beginPath();
  ctx.arc(px, py, CELL_SIZE * 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(201, 169, 98, 0.15)';
  ctx.fill();

  // Core
  ctx.beginPath();
  ctx.arc(px, py, CELL_SIZE + 1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 240, 200, 0.8)';
  ctx.fill();
}

function draw() {
  if (running) {
    for (let i = 0; i < speed; i++) {
      stepAnt();
    }
  }

  ctx.putImageData(imageData, 0, 0);
  drawAnt();

  // Update UI periodically
  if (steps % 200 < speed) {
    stepEl.textContent = `step ${steps.toLocaleString()}`;
    updatePhase();
  }

  requestAnimationFrame(draw);
}

// Events
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    resize();
  } else if (e.code === 'ArrowUp') {
    e.preventDefault();
    speed = Math.min(speed * 2, 3200);
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    speed = Math.max(Math.floor(speed / 2), 1);
  } else if (e.key === '1') {
    currentVariant = 0;
    resize();
  } else if (e.key === '2') {
    currentVariant = 1;
    resize();
  } else if (e.key === '3') {
    currentVariant = 2;
    resize();
  } else if (e.key === 'p' || e.key === 'P') {
    running = !running;
  }
});

canvas.addEventListener('click', (e) => {
  // Place the ant at click position
  antX = Math.floor(e.clientX / CELL_SIZE);
  antY = Math.floor(e.clientY / CELL_SIZE);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  antX = Math.floor(e.touches[0].clientX / CELL_SIZE);
  antY = Math.floor(e.touches[0].clientY / CELL_SIZE);
}, { passive: false });

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 12000);

// Init
resize();
draw();
</script>
</body>
</html>
