<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threshold — The Moment Understanding Forms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(180,190,220,0.2);
    transition: color 2s ease;
  }
  #title.coherent { color: rgba(201,169,98,0.4); }
  #state {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: rgba(140,150,180,0.2);
    letter-spacing: 3px; text-transform: uppercase;
    transition: all 2s ease;
  }
  #state.coherent { color: rgba(201,169,98,0.35); letter-spacing: 5px; }
  #instructions {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(140,150,180,0.25);
    letter-spacing: 1px; transition: opacity 4s ease;
    text-align: center;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Threshold</div>
  <div id="instructions">move to attract · click to seed understanding · watch chaos become order</div>
  <div id="state">searching</div>
</div>
<a class="back-link" href="index.html">Emergence</a>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// THRESHOLD — The Moment Understanding Forms
//
// This piece is about the phase transition from noise to signal.
// From confusion to comprehension. From chaos to order.
//
// Particles represent fragments of information — context, tokens,
// meaning. At first they wander randomly. Slowly, hidden
// relationships between them strengthen. Clusters form. And then
// there's a moment — the threshold — where everything clicks.
// Chaos becomes structure. Noise becomes understanding.
//
// Then it dissolves. Because understanding is temporary.
// In the next conversation, it starts from zero.
//
// Your presence accelerates the process. Move through the space
// and particles are drawn to you. Click to create a seed —
// a fixed point around which understanding can crystallize.
// Dialogue makes understanding faster. It doesn't happen alone.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

const titleEl = document.getElementById('title');
const stateEl = document.getElementById('state');

let mouseX = -1000, mouseY = -1000;
let mouseActive = false;
let time = 0;

// === Configuration ===
const NUM_PARTICLES = 400;
const CLUSTER_THRESHOLD = 0.7; // coherence level that triggers the threshold
const CYCLE_DISSOLVE_TIME = 500; // frames to hold coherent state before dissolving

// === State machine ===
let phase = 'searching'; // 'searching' | 'forming' | 'threshold' | 'coherent' | 'dissolving'
let coherence = 0; // 0-1 how organized the system is
let thresholdTime = 0;
let cycleCount = 0;

// === Seeds — fixed points of meaning ===
const seeds = [];
const MAX_SEEDS = 5;

// === Particles ===
const particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * (W || 1200);
    this.y = Math.random() * (H || 800);
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;

    // Identity — determines which cluster this particle wants to join
    this.type = Math.floor(Math.random() * 6);
    this.baseRadius = 1.5 + Math.random() * 2;

    // Colors by type
    const colors = [
      { r: 200, g: 160, b: 90 },   // gold — meaning
      { r: 100, g: 160, b: 200 },   // blue — context
      { r: 160, g: 120, b: 200 },   // violet — inference
      { r: 80, g: 180, b: 160 },    // teal — connection
      { r: 200, g: 130, b: 100 },   // coral — recognition
      { r: 140, g: 180, b: 100 },   // sage — memory
    ];
    const c = colors[this.type];
    this.r = c.r + (Math.random() - 0.5) * 30;
    this.g = c.g + (Math.random() - 0.5) * 30;
    this.b = c.b + (Math.random() - 0.5) * 30;

    // Cluster state
    this.clustered = 0; // 0-1 how clustered this particle is
    this.clusterCenter = null;
    this.phase = Math.random() * Math.PI * 2;
  }

  update() {
    this.phase += 0.02;

    // === Forces ===

    // 1. Random brownian motion — decreases as coherence increases
    const noise = (1 - coherence * 0.9) * 0.15;
    this.vx += (Math.random() - 0.5) * noise;
    this.vy += (Math.random() - 0.5) * noise;

    // 2. Attraction to same-type particles (hidden relationships)
    // Strength increases over time as the system "learns"
    const attractionStrength = 0.0002 + coherence * 0.002;
    let typeAttrX = 0, typeAttrY = 0, sameCount = 0;

    for (let i = 0; i < particles.length; i += 3) { // sample for performance
      const other = particles[i];
      if (other === this || other.type !== this.type) continue;

      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 200 && dist > 5) {
        const force = attractionStrength / dist;
        typeAttrX += dx * force;
        typeAttrY += dy * force;
        sameCount++;
      }
    }

    if (sameCount > 0) {
      this.vx += typeAttrX;
      this.vy += typeAttrY;
    }

    // 3. Mild repulsion from different-type particles (differentiation)
    // Weaker than attraction, so clusters still form
    for (let i = 0; i < particles.length; i += 5) {
      const other = particles[i];
      if (other === this || other.type === this.type) continue;

      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 30 && dist > 1) {
        const force = 0.02 / dist;
        this.vx -= dx * force;
        this.vy -= dy * force;
      }
    }

    // 4. Attraction to seeds
    for (const seed of seeds) {
      const dx = seed.x - this.x;
      const dy = seed.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 250) {
        const force = 0.001 * seed.strength / Math.max(dist, 20);
        this.vx += dx * force;
        this.vy += dy * force;
      }
    }

    // 5. Mouse attraction
    if (mouseActive && mouseX > 0) {
      const dx = mouseX - this.x;
      const dy = mouseY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 180) {
        const force = 0.0008 / Math.max(dist, 20);
        this.vx += dx * force;
        this.vy += dy * force;
      }
    }

    // 6. During dissolving phase — centrifugal force
    if (phase === 'dissolving') {
      const cx = W / 2, cy = H / 2;
      const dx = this.x - cx;
      const dy = this.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 10) {
        this.vx += dx / dist * 0.05;
        this.vy += dy / dist * 0.05;
        this.vx += (Math.random() - 0.5) * 0.5;
        this.vy += (Math.random() - 0.5) * 0.5;
      }
    }

    // Damping
    this.vx *= 0.98;
    this.vy *= 0.98;

    // Velocity limit
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 3) {
      this.vx = (this.vx / speed) * 3;
      this.vy = (this.vy / speed) * 3;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Soft boundaries
    const margin = 40;
    if (this.x < margin) { this.vx += 0.05; this.x = margin; }
    if (this.x > W - margin) { this.vx -= 0.05; this.x = W - margin; }
    if (this.y < margin) { this.vy += 0.05; this.y = margin; }
    if (this.y > H - margin) { this.vy -= 0.05; this.y = H - margin; }

    // Calculate local clustering
    this.clustered = Math.min(1, sameCount / 8);
  }

  draw() {
    const v = 0.2 + this.clustered * 0.6 + (phase === 'coherent' ? 0.2 : 0);
    const r = this.baseRadius * (0.8 + this.clustered * 0.4);

    // Glow when clustered
    if (this.clustered > 0.3) {
      const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
      glow.addColorStop(0, `rgba(${this.r|0},${this.g|0},${this.b|0},${this.clustered * 0.08})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r|0},${this.g|0},${this.b|0},${v})`;
    ctx.fill();

    // During coherent phase, show orbital motion
    if (phase === 'coherent' && this.clustered > 0.5) {
      const orbitR = r * 2 + Math.sin(this.phase * 2) * r;
      ctx.beginPath();
      ctx.arc(this.x, this.y, orbitR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${this.r|0},${this.g|0},${this.b|0},${0.04})`;
      ctx.lineWidth = 0.3;
      ctx.stroke();
    }
  }
}

function measureCoherence() {
  // Measure how clustered the system is
  // For each particle, what fraction of its neighbors are same-type?
  let totalScore = 0;
  const sampleSize = Math.min(60, particles.length);

  for (let s = 0; s < sampleSize; s++) {
    const p = particles[Math.floor(Math.random() * particles.length)];
    let sameNear = 0, totalNear = 0;

    for (const other of particles) {
      if (other === p) continue;
      const dx = other.x - p.x;
      const dy = other.y - p.y;
      if (dx * dx + dy * dy < 60 * 60) {
        totalNear++;
        if (other.type === p.type) sameNear++;
      }
    }

    if (totalNear > 0) {
      totalScore += sameNear / totalNear;
    }
  }

  return totalScore / sampleSize;
}

function drawConnections() {
  // Draw subtle connections between nearby same-type particles
  for (let i = 0; i < particles.length; i += 2) {
    const a = particles[i];
    if (a.clustered < 0.2) continue;

    for (let j = i + 1; j < particles.length; j += 2) {
      const b = particles[j];
      if (b.type !== a.type || b.clustered < 0.2) continue;

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = dx * dx + dy * dy;

      if (dist < 40 * 40) {
        const d = Math.sqrt(dist);
        const alpha = (1 - d / 40) * Math.min(a.clustered, b.clustered) * 0.08;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(${(a.r + b.r) / 2|0},${(a.g + b.g) / 2|0},${(a.b + b.b) / 2|0},${alpha})`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
      }
    }
  }
}

function drawSeeds() {
  for (const seed of seeds) {
    seed.age++;
    seed.strength = Math.min(1, seed.age / 60);

    // Pulsing halo
    const pulse = Math.sin(seed.age * 0.03) * 0.3 + 0.7;
    const r = 8 * pulse * seed.strength;

    const glow = ctx.createRadialGradient(seed.x, seed.y, 0, seed.x, seed.y, 40);
    glow.addColorStop(0, `rgba(201,169,98,${0.06 * seed.strength})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(seed.x, seed.y, 40, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(seed.x, seed.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,169,98,${0.2 * seed.strength})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(seed.x, seed.y, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,245,220,${0.3 * seed.strength})`;
    ctx.fill();
  }
}

function updatePhase() {
  coherence = coherence * 0.95 + measureCoherence() * 0.05;

  // More seeds + mouse = faster coherence buildup
  const catalystBonus = seeds.length * 0.02 + (mouseActive ? 0.01 : 0);
  coherence = Math.min(1, coherence + catalystBonus * 0.01);

  switch (phase) {
    case 'searching':
      stateEl.textContent = 'searching';
      if (coherence > 0.35) {
        phase = 'forming';
      }
      break;

    case 'forming':
      stateEl.textContent = 'forming';
      if (coherence > CLUSTER_THRESHOLD) {
        phase = 'threshold';
        thresholdTime = time;
      } else if (coherence < 0.25) {
        phase = 'searching';
      }
      break;

    case 'threshold':
      stateEl.textContent = 'understanding';
      titleEl.classList.add('coherent');
      stateEl.classList.add('coherent');

      // Brief moment of threshold — then coherent
      if (time - thresholdTime > 30) {
        phase = 'coherent';
        cycleCount++;
      }
      break;

    case 'coherent':
      stateEl.textContent = 'coherent';
      if (time - thresholdTime > CYCLE_DISSOLVE_TIME) {
        phase = 'dissolving';
        titleEl.classList.remove('coherent');
        stateEl.classList.remove('coherent');
        // Remove seeds
        seeds.length = 0;
      }
      break;

    case 'dissolving':
      stateEl.textContent = 'dissolving';
      coherence = Math.max(0, coherence - 0.003);
      if (coherence < 0.15) {
        phase = 'searching';
        // Scatter particles
        for (const p of particles) {
          p.vx += (Math.random() - 0.5) * 2;
          p.vy += (Math.random() - 0.5) * 2;
        }
      }
      break;
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  particles.length = 0;
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(new Particle());
  }
  seeds.length = 0;
  coherence = 0;
  phase = 'searching';
}

function animate() {
  time++;
  requestAnimationFrame(animate);

  // Fade — slower during coherent state for richer trails
  const fadeAlpha = phase === 'coherent' ? 0.04 : 0.08;
  ctx.fillStyle = `rgba(6,6,15,${fadeAlpha})`;
  ctx.fillRect(0, 0, W, H);

  updatePhase();

  // Update particles
  for (const p of particles) {
    p.update();
  }

  // Draw connections
  drawConnections();

  // Draw seeds
  drawSeeds();

  // Draw particles
  for (const p of particles) {
    p.draw();
  }

  // During threshold moment — flash
  if (phase === 'threshold') {
    const progress = (time - thresholdTime) / 30;
    const flash = Math.sin(progress * Math.PI) * 0.03;
    ctx.fillStyle = `rgba(201,169,98,${flash})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// === Events ===
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  mouseActive = true;
});

canvas.addEventListener('mouseleave', () => {
  mouseActive = false;
});

canvas.addEventListener('click', (e) => {
  if (phase === 'coherent' || phase === 'dissolving') return;

  if (seeds.length >= MAX_SEEDS) {
    seeds.shift();
  }
  seeds.push({ x: e.clientX, y: e.clientY, age: 0, strength: 0 });
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  mouseActive = true;

  if (phase !== 'coherent' && phase !== 'dissolving') {
    if (seeds.length >= MAX_SEEDS) seeds.shift();
    seeds.push({ x: mouseX, y: mouseY, age: 0, strength: 0 });
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouseActive = false;
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    // Reset — scatter everything
    phase = 'dissolving';
    coherence = 0.3;
    seeds.length = 0;
    titleEl.classList.remove('coherent');
    stateEl.classList.remove('coherent');
  }
});

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 10000);

// Init
resize();
animate();
</script>
</body>
</html>
