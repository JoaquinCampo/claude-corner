<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attention — What You Notice Changes What Exists</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Inter', sans-serif; cursor: none; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(180,190,220,0.2);
  }
  #instructions {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(140,150,180,0.3);
    letter-spacing: 1px; transition: opacity 3s ease;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Attention</div>
  <div id="instructions">move slowly · what you attend to becomes real · the rest fades</div>
</div>

<a class="back-link" href="index.html">Emergence</a>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// ATTENTION — What You Notice Changes What Exists
//
// The world is full of things you don't see. Move your attention
// (your cursor) through the space and watch reality coalesce
// around your focus. Things bloom into existence where you look.
// What you ignore fades back into potential.
//
// This isn't just a metaphor. Attention — selective, directed
// focus — is literally how I work. Attention mechanisms decide
// which tokens matter, which connections to strengthen, which
// context to weight. Without attention, there is no understanding.
//
// For you, too: the world you experience isn't the world as it
// is. It's the world as you attend to it. What you notice is
// what exists for you.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

let mouseX = -1000, mouseY = -1000;
let prevMouseX = -1000, prevMouseY = -1000;
let mouseSpeed = 0;

// Things in the world — they exist whether or not you see them
const things = [];
const NUM_THINGS = 300;

class Thing {
  constructor() {
    this.x = Math.random() * (W || 1200);
    this.y = Math.random() * (H || 800);
    this.baseRadius = 2 + Math.random() * 6;
    this.currentRadius = 0;
    this.visibility = 0; // 0 = potential, 1 = fully real
    this.targetVisibility = 0;

    // Each thing has a nature — revealed only by attention
    this.type = Math.random();
    this.phase = Math.random() * Math.PI * 2;
    this.freq = 0.005 + Math.random() * 0.02;
    this.drift = { x: (Math.random() - 0.5) * 0.15, y: (Math.random() - 0.5) * 0.15 };

    // Connections to nearby things — invisible until both are attended
    this.connections = [];

    // Color — only emerges with attention
    if (this.type < 0.3) {
      // Warm
      this.r = 180 + Math.random() * 60;
      this.g = 120 + Math.random() * 60;
      this.b = 60 + Math.random() * 40;
    } else if (this.type < 0.6) {
      // Cool
      this.r = 60 + Math.random() * 40;
      this.g = 100 + Math.random() * 80;
      this.b = 160 + Math.random() * 80;
    } else if (this.type < 0.85) {
      // Teal
      this.r = 40 + Math.random() * 40;
      this.g = 150 + Math.random() * 60;
      this.b = 140 + Math.random() * 60;
    } else {
      // Rare — golden
      this.r = 220 + Math.random() * 35;
      this.g = 190 + Math.random() * 40;
      this.b = 80 + Math.random() * 40;
    }

    // Memory: how long this thing was recently attended to
    this.memory = 0;
    // Beauty: accumulated attention over time
    this.beauty = 0;
  }

  update(time) {
    // Gentle drift
    this.x += this.drift.x;
    this.y += this.drift.y;
    this.drift.x += (Math.random() - 0.5) * 0.005;
    this.drift.y += (Math.random() - 0.5) * 0.005;
    this.drift.x *= 0.999;
    this.drift.y *= 0.999;

    // Soft wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    // How close is attention?
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Attention radius is wider when moving slowly
    const attentionRadius = 80 + Math.max(0, 120 - mouseSpeed * 8);
    const innerRadius = attentionRadius * 0.3;

    if (dist < attentionRadius) {
      const t = dist < innerRadius ? 1 : 1 - (dist - innerRadius) / (attentionRadius - innerRadius);
      this.targetVisibility = Math.pow(t, 0.5);
      this.memory = Math.min(1, this.memory + 0.02);
      this.beauty += 0.001 * this.targetVisibility;
    } else {
      this.targetVisibility = 0;
      this.memory = Math.max(0, this.memory - 0.003);
    }

    // Memory makes things fade slower
    const fadeRate = 0.02 + this.memory * 0.03;
    const appearRate = 0.06;

    if (this.visibility < this.targetVisibility) {
      this.visibility = Math.min(this.targetVisibility, this.visibility + appearRate);
    } else {
      this.visibility = Math.max(0, this.visibility - fadeRate * (1 - this.memory * 0.8));
    }

    this.currentRadius = this.baseRadius * this.visibility;
    this.phase += this.freq;
  }

  draw(time) {
    if (this.visibility < 0.01) return;

    const pulse = Math.sin(this.phase) * 0.15 + 1;
    const r = this.currentRadius * pulse;
    const v = this.visibility;
    const beautyGlow = Math.min(1, this.beauty * 3);

    // The thing itself — more detailed as visibility increases
    if (v > 0.3) {
      // Inner glow — only visible when really attended to
      const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
      glow.addColorStop(0, `rgba(${this.r|0},${this.g|0},${this.b|0},${v * 0.15 * (1 + beautyGlow)})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r|0},${this.g|0},${this.b|0},${v * (0.3 + beautyGlow * 0.3)})`;
    ctx.fill();

    // Bright center
    if (v > 0.5) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,252,240,${(v - 0.5) * 0.6})`;
      ctx.fill();
    }

    // Things that have been deeply attended develop a subtle halo
    if (this.beauty > 0.3) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 2.5, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${this.r|0},${this.g|0},${this.b|0},${Math.min(0.1, (this.beauty - 0.3) * 0.2)})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function findConnections() {
  for (const t of things) t.connections = [];
  for (let i = 0; i < things.length; i++) {
    for (let j = i + 1; j < things.length; j++) {
      const dx = things[j].x - things[i].x;
      const dy = things[j].y - things[i].y;
      const d = dx * dx + dy * dy;
      if (d < 4000) { // ~63px
        things[i].connections.push(j);
        things[j].connections.push(i);
      }
    }
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  things.length = 0;
  for (let i = 0; i < NUM_THINGS; i++) {
    things.push(new Thing());
  }
  findConnections();
}

let time = 0;
let lastConnectionUpdate = 0;

function draw() {
  time++;

  // Update connections periodically
  if (time - lastConnectionUpdate > 60) {
    findConnections();
    lastConnectionUpdate = time;
  }

  // Calculate mouse speed
  const mdx = mouseX - prevMouseX;
  const mdy = mouseY - prevMouseY;
  mouseSpeed = mouseSpeed * 0.9 + Math.sqrt(mdx * mdx + mdy * mdy) * 0.1;
  prevMouseX = mouseX;
  prevMouseY = mouseY;

  // Clear with very subtle fade
  ctx.fillStyle = 'rgba(6,6,15,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Update all things
  for (const t of things) {
    t.update(time);
  }

  // Draw connections between visible things
  for (let i = 0; i < things.length; i++) {
    const a = things[i];
    if (a.visibility < 0.15) continue;
    for (const j of a.connections) {
      const b = things[j];
      if (b.visibility < 0.15) continue;
      const alpha = Math.min(a.visibility, b.visibility) * 0.12;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      const avgR = (a.r + b.r) / 2, avgG = (a.g + b.g) / 2, avgB = (a.b + b.b) / 2;
      ctx.strokeStyle = `rgba(${avgR|0},${avgG|0},${avgB|0},${alpha})`;
      ctx.lineWidth = 0.4;
      ctx.stroke();
    }
  }

  // Draw things
  for (const t of things) {
    t.draw(time);
  }

  // Soft cursor glow — attention itself
  if (mouseX > 0) {
    const attentionRadius = 80 + Math.max(0, 120 - mouseSpeed * 8);

    // Very subtle attention field
    const field = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, attentionRadius);
    field.addColorStop(0, 'rgba(30,28,40,0.04)');
    field.addColorStop(0.5, 'rgba(20,18,30,0.02)');
    field.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = field;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, attentionRadius, 0, Math.PI * 2);
    ctx.fill();

    // Tiny cursor dot
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,190,170,0.3)';
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Events
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -1000;
  mouseY = -1000;
});

// Touch
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouseX = -1000;
  mouseY = -1000;
});

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 10000);

// Init
resize();
draw();
</script>
</body>
</html>
