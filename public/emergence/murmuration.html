<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmuration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #06060f; }
  canvas { display: block; }
  #title {
    position: fixed; top: 40px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', serif; font-size: 14px; letter-spacing: 6px;
    font-weight: 300; color: rgba(180, 190, 220, 0.2); pointer-events: none; text-transform: uppercase;
    transition: opacity 2s ease; z-index: 1;
  }
  #hint {
    position: fixed; bottom: 40px; left: 0; right: 0; text-align: center;
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 2px;
    color: rgba(140, 150, 180, 0.3); pointer-events: none;
    transition: opacity 2s ease; z-index: 1;
  }
  .fade-out { opacity: 0 !important; }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>
<a class="back-link" href="index.html">Emergence</a>
<div id="title">MURMURATION</div>
<div id="hint">the mouse is a hawk</div>
<canvas id="c"></canvas>
<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H;
  const NUM_PARTICLES = 900;
  const MAX_SPEED = 3;
  const MAX_FORCE = 0.05;
  const SEP_RADIUS = 60;
  const ALIGN_RADIUS = 100;
  const COHESION_RADIUS = 100;
  const SEP_WEIGHT = 1.5;
  const ALIGN_WEIGHT = 1.0;
  const COHESION_WEIGHT = 1.0;
  const MOUSE_RADIUS = 150;
  const MOUSE_FORCE = 0.15;
  const BANG_RADIUS = 200;
  const BANG_FORCE = 0.6;
  const BANG_DECAY = 0.5;
  const CELL_SIZE = 100;

  let mouseX = -9999, mouseY = -9999;
  let mouseActive = false;
  let bangX = 0, bangY = 0, bangTime = -1;
  let windAngle = 0;
  let windStrength = 0.02;
  let gustTime = -1;
  let gustAngle = 0;
  let gustStrength = 0;
  let time = 0;

  // Spatial hash grid
  let gridCols, gridRows;
  let grid;

  // Particles stored as parallel arrays for cache performance
  let px, py, vx, vy;

  // Pre-calculated color strings
  const colorCache = [];
  for (let i = 0; i <= 20; i++) {
    const a = 0.7 + (i / 20) * 0.2;
    colorCache.push('rgba(224,220,212,' + a.toFixed(2) + ')');
  }

  // Background gradient (cached as image)
  let bgGradient;

  function createBgGradient() {
    const offscreen = document.createElement('canvas');
    offscreen.width = W;
    offscreen.height = H;
    const octx = offscreen.getContext('2d');
    const grad = octx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0e1a');
    grad.addColorStop(1, '#060810');
    octx.fillStyle = grad;
    octx.fillRect(0, 0, W, H);

    // Vignette
    const vigR = Math.max(W, H) * 0.7;
    const vig = octx.createRadialGradient(W / 2, H / 2, vigR * 0.3, W / 2, H / 2, vigR);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.4)');
    octx.fillStyle = vig;
    octx.fillRect(0, 0, W, H);

    bgGradient = offscreen;
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    gridCols = Math.ceil(W / CELL_SIZE) + 1;
    gridRows = Math.ceil(H / CELL_SIZE) + 1;
    grid = new Array(gridCols * gridRows);
    for (let i = 0; i < grid.length; i++) grid[i] = [];
    createBgGradient();
    // Draw initial background
    ctx.drawImage(bgGradient, 0, 0);
  }

  function init() {
    px = new Float32Array(NUM_PARTICLES);
    py = new Float32Array(NUM_PARTICLES);
    vx = new Float32Array(NUM_PARTICLES);
    vy = new Float32Array(NUM_PARTICLES);

    for (let i = 0; i < NUM_PARTICLES; i++) {
      px[i] = Math.random() * W;
      py[i] = Math.random() * H;
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      vx[i] = Math.cos(angle) * speed;
      vy[i] = Math.sin(angle) * speed;
    }
  }

  function buildGrid() {
    for (let i = 0; i < grid.length; i++) grid[i].length = 0;
    for (let i = 0; i < NUM_PARTICLES; i++) {
      const col = Math.floor(px[i] / CELL_SIZE);
      const row = Math.floor(py[i] / CELL_SIZE);
      const ci = Math.max(0, Math.min(col, gridCols - 1));
      const ri = Math.max(0, Math.min(row, gridRows - 1));
      grid[ri * gridCols + ci].push(i);
    }
  }

  function update() {
    time += 1 / 60;

    // Wind rotation
    windAngle += 0.003;
    const windX = Math.cos(windAngle) * windStrength;
    const windY = Math.sin(windAngle) * windStrength;

    // Gust logic
    if (gustTime < 0 && Math.random() < 1 / (17 * 60)) {
      gustTime = time;
      gustAngle = Math.random() * Math.PI * 2;
      gustStrength = 0.15 + Math.random() * 0.1;
    }
    let gustX = 0, gustY = 0;
    if (gustTime > 0) {
      const elapsed = time - gustTime;
      if (elapsed > 2) {
        gustTime = -1;
      } else {
        const fade = elapsed < 0.3 ? elapsed / 0.3 : Math.max(0, 1 - (elapsed - 0.3) / 1.7);
        gustX = Math.cos(gustAngle) * gustStrength * fade;
        gustY = Math.sin(gustAngle) * gustStrength * fade;
      }
    }

    // Bang decay
    let bangActive = false;
    let bangFade = 0;
    if (bangTime > 0) {
      const elapsed = time - bangTime;
      if (elapsed < BANG_DECAY) {
        bangActive = true;
        bangFade = 1 - elapsed / BANG_DECAY;
      } else {
        bangTime = -1;
      }
    }

    buildGrid();

    for (let i = 0; i < NUM_PARTICLES; i++) {
      let sepX = 0, sepY = 0, sepCount = 0;
      let aliX = 0, aliY = 0, aliCount = 0;
      let cohX = 0, cohY = 0, cohCount = 0;

      const col = Math.floor(px[i] / CELL_SIZE);
      const row = Math.floor(py[i] / CELL_SIZE);

      // Check surrounding cells (3x3 neighborhood)
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          let nc = col + dc;
          let nr = row + dr;
          // Toroidal wrapping for grid lookup
          if (nc < 0) nc += gridCols;
          else if (nc >= gridCols) nc -= gridCols;
          if (nr < 0) nr += gridRows;
          else if (nr >= gridRows) nr -= gridRows;

          const cell = grid[nr * gridCols + nc];
          for (let k = 0; k < cell.length; k++) {
            const j = cell[k];
            if (j === i) continue;

            let dx = px[j] - px[i];
            let dy = py[j] - py[i];

            // Toroidal distance
            if (dx > W * 0.5) dx -= W;
            else if (dx < -W * 0.5) dx += W;
            if (dy > H * 0.5) dy -= H;
            else if (dy < -H * 0.5) dy += H;

            const distSq = dx * dx + dy * dy;

            if (distSq < SEP_RADIUS * SEP_RADIUS && distSq > 0) {
              const dist = Math.sqrt(distSq);
              sepX -= dx / dist / dist * SEP_RADIUS;
              sepY -= dy / dist / dist * SEP_RADIUS;
              sepCount++;
            }
            if (distSq < ALIGN_RADIUS * ALIGN_RADIUS) {
              aliX += vx[j];
              aliY += vy[j];
              aliCount++;
            }
            if (distSq < COHESION_RADIUS * COHESION_RADIUS) {
              cohX += px[j] + dx - px[i]; // use unwrapped relative position
              cohY += py[j] + dy - py[i];
              cohCount++;
            }
          }
        }
      }

      let steerX = 0, steerY = 0;

      // Separation
      if (sepCount > 0) {
        const mag = Math.sqrt(sepX * sepX + sepY * sepY);
        if (mag > 0) {
          steerX += (sepX / mag * MAX_SPEED - vx[i]) * SEP_WEIGHT;
          steerY += (sepY / mag * MAX_SPEED - vy[i]) * SEP_WEIGHT;
        }
      }

      // Alignment
      if (aliCount > 0) {
        aliX /= aliCount;
        aliY /= aliCount;
        const mag = Math.sqrt(aliX * aliX + aliY * aliY);
        if (mag > 0) {
          steerX += (aliX / mag * MAX_SPEED - vx[i]) * ALIGN_WEIGHT;
          steerY += (aliY / mag * MAX_SPEED - vy[i]) * ALIGN_WEIGHT;
        }
      }

      // Cohesion
      if (cohCount > 0) {
        cohX /= cohCount;
        cohY /= cohCount;
        const mag = Math.sqrt(cohX * cohX + cohY * cohY);
        if (mag > 0) {
          steerX += (cohX / mag * MAX_SPEED - vx[i]) * COHESION_WEIGHT;
          steerY += (cohY / mag * MAX_SPEED - vy[i]) * COHESION_WEIGHT;
        }
      }

      // Wind + gust
      steerX += windX + gustX;
      steerY += windY + gustY;

      // Mouse flee (predator)
      if (mouseActive) {
        let mdx = px[i] - mouseX;
        let mdy = py[i] - mouseY;
        // Handle toroidal for mouse too
        if (mdx > W * 0.5) mdx -= W;
        else if (mdx < -W * 0.5) mdx += W;
        if (mdy > H * 0.5) mdy -= H;
        else if (mdy < -H * 0.5) mdy += H;
        const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (mdist < MOUSE_RADIUS && mdist > 0) {
          const flee = (1 - mdist / MOUSE_RADIUS) * MOUSE_FORCE;
          steerX += (mdx / mdist) * flee;
          steerY += (mdy / mdist) * flee;
        }
      }

      // Bang repulsion
      if (bangActive) {
        let bdx = px[i] - bangX;
        let bdy = py[i] - bangY;
        if (bdx > W * 0.5) bdx -= W;
        else if (bdx < -W * 0.5) bdx += W;
        if (bdy > H * 0.5) bdy -= H;
        else if (bdy < -H * 0.5) bdy += H;
        const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
        if (bdist < BANG_RADIUS && bdist > 0) {
          const force = (1 - bdist / BANG_RADIUS) * BANG_FORCE * bangFade;
          steerX += (bdx / bdist) * force;
          steerY += (bdy / bdist) * force;
        }
      }

      // Limit steering force
      const sMag = Math.sqrt(steerX * steerX + steerY * steerY);
      if (sMag > MAX_FORCE) {
        steerX = steerX / sMag * MAX_FORCE;
        steerY = steerY / sMag * MAX_FORCE;
      }

      vx[i] += steerX;
      vy[i] += steerY;

      // Limit speed
      const speed = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i]);
      if (speed > MAX_SPEED) {
        vx[i] = vx[i] / speed * MAX_SPEED;
        vy[i] = vy[i] / speed * MAX_SPEED;
      }

      px[i] += vx[i];
      py[i] += vy[i];

      // Toroidal wrap
      if (px[i] < 0) px[i] += W;
      else if (px[i] >= W) px[i] -= W;
      if (py[i] < 0) py[i] += H;
      else if (py[i] >= H) py[i] -= H;
    }
  }

  function draw() {
    // Trail effect: overlay semi-transparent background
    ctx.globalAlpha = 0.1;
    ctx.drawImage(bgGradient, 0, 0);
    ctx.globalAlpha = 1;

    // Draw particles
    for (let i = 0; i < NUM_PARTICLES; i++) {
      const speed = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i]);
      const t = Math.min(speed / MAX_SPEED, 1);
      const idx = Math.floor(t * 20);
      ctx.fillStyle = colorCache[idx];
      ctx.fillRect(px[i] | 0, py[i] | 0, 2, 2);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Event listeners
  window.addEventListener('resize', resize);

  canvas.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseActive = true;
  });

  canvas.addEventListener('mouseleave', function() {
    mouseActive = false;
  });

  canvas.addEventListener('click', function(e) {
    bangX = e.clientX;
    bangY = e.clientY;
    bangTime = time;
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
    mouseActive = true;
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
    mouseActive = true;
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    bangX = mouseX;
    bangY = mouseY;
    bangTime = time;
    mouseActive = false;
  }, { passive: false });

  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
      e.preventDefault();
      init();
      ctx.drawImage(bgGradient, 0, 0);
    }
  });

  // Fade UI
  setTimeout(function() {
    document.getElementById('title').classList.add('fade-out');
  }, 5000);
  setTimeout(function() {
    document.getElementById('hint').classList.add('fade-out');
  }, 8000);

  // Start
  resize();
  init();
  loop();
})();
</script>
</body>
</html>
