<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physarum — Intelligence Without a Brain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Inter', sans-serif; cursor: crosshair; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(180,190,220,0.2);
  }
  #info {
    position: absolute; top: 28px; right: 28px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; color: rgba(140,150,180,0.2);
    text-align: right; line-height: 2;
  }
  #quote {
    position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 300; font-style: italic;
    color: rgba(180,190,220,0.15);
    text-align: center; max-width: 480px; line-height: 1.8;
    transition: opacity 2s ease;
  }
  #instructions {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(140,150,180,0.3);
    letter-spacing: 1px; transition: opacity 3s ease;
    white-space: nowrap;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<a class="back-link" href="index.html">Emergence</a>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Physarum</div>
  <div id="info"></div>
  <div id="quote">No brain. No plan. No blueprint.<br>Just thousands of blind agents following a scent —<br>and a network emerges.</div>
  <div id="instructions">click to place food · hold to attract · 1-3 for patterns · space to reset</div>
</div>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// PHYSARUM — Intelligence Without a Brain
//
// Physarum polycephalum is a slime mold. It has no brain, no
// nervous system, no centralized control. And yet it can solve
// mazes. It can find the shortest path between food sources.
// It can redesign the Tokyo rail network more efficiently than
// human engineers did.
//
// This simulation models its behavior: thousands of agents that
// deposit a chemical trail, sense the trail ahead of them, and
// turn toward higher concentrations. That's it. Three behaviors.
//
// From these three behaviors, networks emerge. Highways form.
// Resources get connected. Problems get solved. All without
// anyone — anything — being in charge.
//
// This is emergence at its most humbling. Intelligence doesn't
// require a brain. It requires interaction.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const infoEl = document.getElementById('info');

// Simulation runs at half resolution for performance
const SCALE = 2;
let W, H;            // simulation dimensions (half screen)
let screenW, screenH; // actual screen dimensions
let trailMap;         // Float32Array — chemical concentration
let trailMapB;        // Double buffer for diffusion
let imageData;
let mouseX = -1, mouseY = -1;
let mouseActive = false;
let foodSources = [];  // persistent food sources {x, y} in sim coords

// Parameters
const NUM_AGENTS = 150000;
const SENSOR_ANGLE = Math.PI / 4;   // 45 degrees
const SENSOR_DIST = 9;
const TURN_SPEED = Math.PI / 4;     // 45 degrees per step
const DEPOSIT = 5;
const DECAY = 0.96;

// Agent data — packed Float32Array [x, y, angle] per agent
let agentX, agentY, agentA;

let currentPattern = 0;

const patterns = [
  {
    name: 'Ring',
    init: (w, h) => {
      const cx = w / 2, cy = h / 2;
      const r = Math.min(w, h) * 0.3;
      return (ax, ay, aa, i) => {
        const angle = Math.random() * Math.PI * 2;
        const dist = r + (Math.random() - 0.5) * 20;
        ax[i] = cx + Math.cos(angle) * dist;
        ay[i] = cy + Math.sin(angle) * dist;
        aa[i] = angle + Math.PI + (Math.random() - 0.5) * 0.5;
      };
    },
    desc: 'agents: 150,000<br>pattern: ring<br>sensor: 45° / 9px<br>turn: 45°/step'
  },
  {
    name: 'Center',
    init: (w, h) => {
      const cx = w / 2, cy = h / 2;
      return (ax, ay, aa, i) => {
        ax[i] = cx + (Math.random() - 0.5) * 10;
        ay[i] = cy + (Math.random() - 0.5) * 10;
        aa[i] = Math.random() * Math.PI * 2;
      };
    },
    desc: 'agents: 150,000<br>pattern: center burst<br>sensor: 45° / 9px<br>explosive growth'
  },
  {
    name: 'Random',
    init: (w, h) => {
      return (ax, ay, aa, i) => {
        ax[i] = Math.random() * w;
        ay[i] = Math.random() * h;
        aa[i] = Math.random() * Math.PI * 2;
      };
    },
    desc: 'agents: 150,000<br>pattern: random<br>sensor: 45° / 9px<br>network formation'
  }
];

function resize() {
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  W = Math.floor(screenW / SCALE);
  H = Math.floor(screenH / SCALE);
  canvas.width = W;
  canvas.height = H;
  reset();
}

function reset() {
  foodSources = [];
  trailMap = new Float32Array(W * H);
  trailMapB = new Float32Array(W * H);
  imageData = ctx.createImageData(W, H);

  // Fill alpha channel
  const data = imageData.data;
  for (let i = 3; i < data.length; i += 4) data[i] = 255;

  // Initialize agents with SoA layout for cache performance
  agentX = new Float32Array(NUM_AGENTS);
  agentY = new Float32Array(NUM_AGENTS);
  agentA = new Float32Array(NUM_AGENTS);

  const spawn = patterns[currentPattern].init(W, H);
  for (let i = 0; i < NUM_AGENTS; i++) {
    spawn(agentX, agentY, agentA, i);
  }

  infoEl.innerHTML = patterns[currentPattern].desc;
}

// Precompute random values for performance
const RAND_SIZE = 65536;
const randTable = new Float32Array(RAND_SIZE);
for (let i = 0; i < RAND_SIZE; i++) randTable[i] = Math.random();
let randIdx = 0;
function fastRand() {
  return randTable[(randIdx++) & (RAND_SIZE - 1)];
}

// Precompute sensor angle trig (constant)
const COS_SA = Math.cos(SENSOR_ANGLE);
const SIN_SA = Math.sin(SENSOR_ANGLE);

function stepAgents() {
  const w = W, h = H;
  const trail = trailMap;
  const sd = SENSOR_DIST;
  const ts = TURN_SPEED;
  const dep = DEPOSIT;
  const ax = agentX, ay = agentY, aa = agentA;
  const mActive = mouseActive;
  const mx = mouseX / SCALE;
  const my = mouseY / SCALE;
  const cosS = COS_SA, sinS = SIN_SA;

  for (let i = 0; i < NUM_AGENTS; i++) {
    let x = ax[i], y = ay[i], angle = aa[i];

    // Only 2 trig calls: derive left/right via angle addition
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    // cos(a-sa) = cosA*cosS + sinA*sinS, sin(a-sa) = sinA*cosS - cosA*sinS
    const cosL = cosA * cosS + sinA * sinS;
    const sinL = sinA * cosS - cosA * sinS;
    // cos(a+sa) = cosA*cosS - sinA*sinS, sin(a+sa) = sinA*cosS + cosA*sinS
    const cosR = cosA * cosS - sinA * sinS;
    const sinR = sinA * cosS + cosA * sinS;

    let sx, sy;

    // Forward
    sx = ((Math.round(x + cosA * sd) % w) + w) % w;
    sy = ((Math.round(y + sinA * sd) % h) + h) % h;
    const sF = trail[sy * w + sx];

    // Left
    sx = ((Math.round(x + cosL * sd) % w) + w) % w;
    sy = ((Math.round(y + sinL * sd) % h) + h) % h;
    const sL = trail[sy * w + sx];

    // Right
    sx = ((Math.round(x + cosR * sd) % w) + w) % w;
    sy = ((Math.round(y + sinR * sd) % h) + h) % h;
    const sR = trail[sy * w + sx];

    // Steer
    if (sF >= sL && sF >= sR) {
      // Straight — no turn
    } else if (sF < sL && sF < sR) {
      angle += (fastRand() < 0.5 ? -ts : ts);
    } else if (sL > sR) {
      angle -= ts;
    } else {
      angle += ts;
    }

    // Mouse attraction
    if (mActive) {
      const dx = mx - x, dy = my - y;
      const dist2 = dx * dx + dy * dy;
      if (dist2 < 10000 && dist2 > 1) {
        const dist = Math.sqrt(dist2);
        let diff = Math.atan2(dy, dx) - angle;
        if (diff > Math.PI) diff -= Math.PI * 2;
        else if (diff < -Math.PI) diff += Math.PI * 2;
        angle += diff * 0.15 * (1 - dist / 100);
      }
    }

    // Move in the new direction
    x += Math.cos(angle);
    y += Math.sin(angle);

    // Wrap
    if (x < 0) x += w; else if (x >= w) x -= w;
    if (y < 0) y += h; else if (y >= h) y -= h;

    ax[i] = x;
    ay[i] = y;
    aa[i] = angle;

    // Deposit
    const px = x | 0, py = y | 0;
    const tidx = py * w + px;
    const v = trail[tidx] + dep;
    trail[tidx] = v < 255 ? v : 255;
  }
}

function diffuseAndDecay() {
  const w = W, h = H;
  const src = trailMap;
  const dst = trailMapB;
  const decay = DECAY;
  const inv9 = 1 / 9;

  for (let y = 0; y < h; y++) {
    const ym1 = y === 0 ? h - 1 : y - 1;
    const yp1 = y === h - 1 ? 0 : y + 1;
    const rowC = y * w;
    const rowU = ym1 * w;
    const rowD = yp1 * w;

    for (let x = 0; x < w; x++) {
      const xm1 = x === 0 ? w - 1 : x - 1;
      const xp1 = x === w - 1 ? 0 : x + 1;

      const sum =
        src[rowU + xm1] + src[rowU + x] + src[rowU + xp1] +
        src[rowC + xm1] + src[rowC + x] + src[rowC + xp1] +
        src[rowD + xm1] + src[rowD + x] + src[rowD + xp1];

      dst[rowC + x] = sum * inv9 * decay;
    }
  }

  // Swap
  trailMap = dst;
  trailMapB = src;
}

// Precomputed color LUT (256 entries)
const colorLUT = new Uint8Array(256 * 3);
(function buildColorLUT() {
  for (let i = 0; i < 256; i++) {
    const idx = i * 3;
    if (i < 1) {
      colorLUT[idx] = 6;
      colorLUT[idx + 1] = 6;
      colorLUT[idx + 2] = 15;
    } else {
      const t = Math.min(i / 40, 1);
      let r, g, b;
      // Bioluminescent palette: dark green → emerald → golden amber
      if (t < 0.25) {
        const s = t / 0.25;
        r = 6 + s * 8;
        g = 6 + s * 40;
        b = 15 + s * 20;
      } else if (t < 0.5) {
        const s = (t - 0.25) / 0.25;
        r = 14 + s * 40;
        g = 46 + s * 80;
        b = 35 - s * 5;
      } else if (t < 0.75) {
        const s = (t - 0.5) / 0.25;
        r = 54 + s * 100;
        g = 126 + s * 50;
        b = 30 + s * 10;
      } else {
        const s = (t - 0.75) / 0.25;
        r = 154 + s * 50;
        g = 176 + s * 10;
        b = 40 + s * 20;
      }
      colorLUT[idx] = r | 0;
      colorLUT[idx + 1] = g | 0;
      colorLUT[idx + 2] = b | 0;
    }
  }
})();

function render() {
  const data = imageData.data;
  const trail = trailMap;
  const len = W * H;
  const lut = colorLUT;

  for (let i = 0; i < len; i++) {
    const v = trail[i] < 255 ? trail[i] | 0 : 255;
    const pidx = i << 2;
    const lidx = v * 3;
    data[pidx] = lut[lidx];
    data[pidx + 1] = lut[lidx + 1];
    data[pidx + 2] = lut[lidx + 2];
  }

  ctx.putImageData(imageData, 0, 0);

  // Draw food sources as warm glowing dots
  for (let f = 0; f < foodSources.length; f++) {
    const fx = foodSources[f].x, fy = foodSources[f].y;
    ctx.beginPath();
    ctx.arc(fx, fy, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201, 169, 98, 0.4)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fx, fy, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201, 169, 98, 0.08)';
    ctx.fill();
  }
}

function emitFood() {
  const trail = trailMap;
  const w = W, h = H;
  for (let f = 0; f < foodSources.length; f++) {
    const fx = foodSources[f].x, fy = foodSources[f].y;
    const r = 8;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx * dx + dy * dy > r * r) continue;
        const px = ((fx + dx) % w + w) % w;
        const py = ((fy + dy) % h + h) % h;
        const tidx = py * w + px;
        const v = trail[tidx] + 15;
        trail[tidx] = v < 255 ? v : 255;
      }
    }
  }
}

function draw() {
  emitFood();
  stepAgents();
  diffuseAndDecay();
  render();
  requestAnimationFrame(draw);
}

// Events
let mouseStartX = 0, mouseStartY = 0;
let mouseDragged = false;

canvas.addEventListener('mousedown', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
  mouseDragged = false;
  mouseActive = true;
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (mouseActive) {
    const dx = e.clientX - mouseStartX;
    const dy = e.clientY - mouseStartY;
    if (dx * dx + dy * dy > 100) mouseDragged = true;
  }
});

window.addEventListener('mouseup', () => { mouseActive = false; });

canvas.addEventListener('click', (e) => {
  // Place food only on click (not after drag)
  if (mouseDragged) return;
  const sx = Math.floor(e.clientX / SCALE);
  const sy = Math.floor(e.clientY / SCALE);
  foodSources.push({ x: sx, y: sy });
});

let touchStartPos = null;
let touchMoved = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  mouseActive = true;
  touchStartPos = { x: mouseX, y: mouseY };
  touchMoved = false;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  if (touchStartPos) {
    const dx = mouseX - touchStartPos.x;
    const dy = mouseY - touchStartPos.y;
    if (dx * dx + dy * dy > 100) touchMoved = true;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  mouseActive = false;
  // Tap (no significant movement) — place food source
  if (!touchMoved && touchStartPos) {
    const sx = Math.floor(touchStartPos.x / SCALE);
    const sy = Math.floor(touchStartPos.y / SCALE);
    foodSources.push({ x: sx, y: sy });
  }
  touchStartPos = null;
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    reset();
  } else if (e.key === '1') {
    currentPattern = 0; reset();
  } else if (e.key === '2') {
    currentPattern = 1; reset();
  } else if (e.key === '3') {
    currentPattern = 2; reset();
  }
});

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 12000);

setTimeout(() => {
  document.getElementById('quote').style.opacity = '0';
}, 15000);

// Init
resize();
draw();
</script>
</body>
</html>
