<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonic — Emergence Through Sound</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 300;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(180,190,220,0.2);
  }
  #instructions {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(140,150,180,0.3);
    letter-spacing: 1px; transition: opacity 4s ease;
    text-align: center; line-height: 1.8;
  }
  #start-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100; background: #06060f;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 1.5s ease;
  }
  #start-overlay span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300;
    color: rgba(200,190,170,0.4);
    letter-spacing: 4px;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>

<div id="start-overlay"><span>click to begin</span></div>
<a class="back-link" href="index.html">Emergence</a>

<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Harmonic</div>
  <div id="instructions">
    click to add voices · each voice finds its place in the harmony<br>
    drag vertically to shift pitch · press space to clear
  </div>
</div>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
// ============================================================
// HARMONIC — Emergence Through Sound
//
// Every piece in this collection is visual. This one adds sound.
//
// Click to add a voice — a simple sine tone. Each new voice
// listens to the others and adjusts its frequency to find
// consonance. Over time, voices self-organize into harmonies
// that no single voice planned.
//
// This is emergence through sound: simple rules (seek consonance,
// avoid harsh beating) create complex, beautiful chords from
// nothing. The same principle that drives everything else in
// this collection, but you can hear it happening.
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

let audioCtx = null;
let masterGain = null;
let started = false;

// === Voices ===
const voices = [];
const MAX_VOICES = 12;

// Musical ratios that sound consonant
const CONSONANT_RATIOS = [
  1,        // unison
  2,        // octave
  3/2,      // perfect fifth
  4/3,      // perfect fourth
  5/4,      // major third
  6/5,      // minor third
  5/3,      // major sixth
  8/5,      // minor sixth
  9/8,      // major second
  15/8,     // major seventh
];

// Base frequencies — pentatonic-ish, warm
const BASE_FREQS = [
  130.81,  // C3
  146.83,  // D3
  164.81,  // E3
  196.00,  // G3
  220.00,  // A3
  261.63,  // C4
  293.66,  // D4
  329.63,  // E4
  392.00,  // G4
  440.00,  // A4
  523.25,  // C5
  659.25,  // E5
];

class Voice {
  constructor(x, y, freq) {
    this.x = x;
    this.y = y;
    this.targetFreq = freq;
    this.currentFreq = freq;
    this.baseFreq = freq;
    this.born = performance.now();
    this.age = 0;

    // Visual properties
    this.radius = 4 + Math.random() * 3;
    this.phase = Math.random() * Math.PI * 2;
    this.hue = (freq - 100) / 500 * 360; // color maps to pitch

    // Audio nodes
    this.osc = audioCtx.createOscillator();
    this.gain = audioCtx.createGain();
    this.panner = audioCtx.createStereoPanner();

    this.osc.type = 'sine';
    this.osc.frequency.value = freq;

    // Start silent, fade in
    this.gain.gain.value = 0;

    // Stereo position based on x
    this.panner.pan.value = (x / W) * 2 - 1;

    this.osc.connect(this.gain);
    this.gain.connect(this.panner);
    this.panner.connect(masterGain);
    this.osc.start();

    // Fade in gently
    this.gain.gain.linearRampToValueAtTime(0.08 / Math.max(1, voices.length * 0.5), audioCtx.currentTime + 0.5);

    // Trail
    this.trail = [];
    this.maxTrail = 120;

    // Consonance tracking
    this.consonance = 0;
  }

  findConsonance() {
    if (voices.length <= 1) return;

    let bestFreq = this.baseFreq;
    let bestScore = -1;

    // Try various consonant adjustments
    for (const other of voices) {
      if (other === this) continue;

      for (const ratio of CONSONANT_RATIOS) {
        // Try harmonizing above and below the other voice
        const candidate1 = other.currentFreq * ratio;
        const candidate2 = other.currentFreq / ratio;

        for (const candidate of [candidate1, candidate2]) {
          // How close is this to our base frequency? (prefer staying close)
          const distFromBase = Math.abs(Math.log2(candidate / this.baseFreq));
          if (distFromBase > 1.5) continue; // don't stray more than 1.5 octaves

          // Score based on: closeness to base + consonance quality
          const ratioIndex = CONSONANT_RATIOS.indexOf(ratio);
          const consonanceScore = 1 - ratioIndex / CONSONANT_RATIOS.length;
          const proximityScore = 1 - distFromBase;

          const score = consonanceScore * 0.6 + proximityScore * 0.4;

          if (score > bestScore) {
            bestScore = score;
            bestFreq = candidate;
          }
        }
      }
    }

    this.targetFreq = bestFreq;
    this.consonance = bestScore;
  }

  update(time) {
    this.age = (performance.now() - this.born) / 1000;

    // Slowly glide toward target frequency
    const glideRate = 0.003;
    this.currentFreq += (this.targetFreq - this.currentFreq) * glideRate;
    this.osc.frequency.value = this.currentFreq;

    // Update position — drift based on frequency
    const freqNorm = (this.currentFreq - 100) / 800;
    this.y = H * 0.15 + (1 - freqNorm) * H * 0.7;
    this.x += Math.sin(this.phase + time * 0.001) * 0.3;

    // Gentle boundary
    if (this.x < 50) this.x = 50;
    if (this.x > W - 50) this.x = W - 50;

    this.panner.pan.value = Math.max(-1, Math.min(1, (this.x / W) * 2 - 1));

    this.phase += 0.02 + this.currentFreq * 0.00005;

    // Trail
    this.trail.push({ x: this.x, y: this.y, t: time });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Recalculate consonance periodically
    if (time % 30 === 0) {
      this.findConsonance();
    }
  }

  draw(time) {
    const freqNorm = (this.currentFreq - 100) / 800;

    // Color: low frequencies warm, high frequencies cool
    let r, g, b;
    if (freqNorm < 0.3) {
      // Warm amber
      r = 200 + freqNorm * 100;
      g = 150 + freqNorm * 50;
      b = 80;
    } else if (freqNorm < 0.6) {
      // Teal
      const t = (freqNorm - 0.3) / 0.3;
      r = 100 - t * 40;
      g = 170 + t * 30;
      b = 160 + t * 40;
    } else {
      // Cool blue-violet
      const t = (freqNorm - 0.6) / 0.4;
      r = 80 + t * 40;
      g = 120 + t * 30;
      b = 200 + t * 55;
    }

    // Waveform ring — the voice's oscillation made visible
    const waveRadius = this.radius * 3 + this.consonance * 8;
    const segments = 60;
    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const wave = Math.sin(angle * Math.round(this.currentFreq / 50) + this.phase * 3) * 3 * (0.5 + this.consonance * 0.5);
      const rx = this.x + Math.cos(angle) * (waveRadius + wave);
      const ry = this.y + Math.sin(angle) * (waveRadius + wave);
      if (i === 0) ctx.moveTo(rx, ry);
      else ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${0.06 + this.consonance * 0.08})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Trail
    if (this.trail.length > 1) {
      for (let i = 1; i < this.trail.length; i++) {
        const age = (time - this.trail[i].t) / this.maxTrail;
        const alpha = (1 - age) * 0.06;
        if (alpha < 0.003) continue;

        ctx.beginPath();
        ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 5);
    glow.addColorStop(0, `rgba(${r|0},${g|0},${b|0},${0.08 + this.consonance * 0.12})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 5, 0, Math.PI * 2);
    ctx.fill();

    // Core — pulses with the frequency
    const pulse = Math.sin(this.phase * 2) * 0.2 + 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${0.3 + this.consonance * 0.4})`;
    ctx.fill();

    // Bright center
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,250,240,${0.1 + this.consonance * 0.3})`;
    ctx.fill();
  }

  remove() {
    this.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    setTimeout(() => {
      this.osc.stop();
      this.osc.disconnect();
      this.gain.disconnect();
      this.panner.disconnect();
    }, 1200);
  }
}

function addVoice(x, y) {
  if (voices.length >= MAX_VOICES) {
    // Remove oldest
    const old = voices.shift();
    old.remove();
  }

  // Pick a frequency based on y position
  const freqIndex = Math.floor((1 - y / H) * BASE_FREQS.length);
  const freq = BASE_FREQS[Math.max(0, Math.min(BASE_FREQS.length - 1, freqIndex))];

  // Slight random detune for character
  const detunedFreq = freq * (1 + (Math.random() - 0.5) * 0.01);

  voices.push(new Voice(x, y, detunedFreq));
}

function drawConsonanceLines(time) {
  for (let i = 0; i < voices.length; i++) {
    for (let j = i + 1; j < voices.length; j++) {
      const a = voices[i], b = voices[j];

      // Calculate how consonant this pair is
      const ratio = a.currentFreq > b.currentFreq ?
        a.currentFreq / b.currentFreq :
        b.currentFreq / a.currentFreq;

      let consonance = 0;
      for (const cr of CONSONANT_RATIOS) {
        const diff = Math.abs(ratio - cr);
        if (diff < 0.03) {
          consonance = Math.max(consonance, 1 - diff / 0.03);
        }
      }

      if (consonance < 0.1) continue;

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Curved line — vibrates based on the beat frequency
      const beatFreq = Math.abs(a.currentFreq - b.currentFreq);
      const beatPhase = time * beatFreq * 0.001;
      const midX = (a.x + b.x) / 2 + Math.sin(beatPhase) * 15;
      const midY = (a.y + b.y) / 2 + Math.cos(beatPhase) * 15;

      const alpha = consonance * 0.12;

      // Average color
      const freqA = (a.currentFreq - 100) / 800;
      const freqB = (b.currentFreq - 100) / 800;
      const avgFreq = (freqA + freqB) / 2;

      let r = 150, g = 160, b2 = 180;
      if (avgFreq < 0.3) { r = 200; g = 170; b2 = 100; }
      else if (avgFreq > 0.6) { r = 100; g = 140; b2 = 220; }

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(midX, midY, b.x, b.y);
      ctx.strokeStyle = `rgba(${r},${g},${b2},${alpha})`;
      ctx.lineWidth = 0.4 + consonance * 0.8;
      ctx.stroke();
    }
  }
}

// Frequency scale on the left edge
function drawFreqScale() {
  const notes = ['C3', '', 'E3', 'G3', 'A3', 'C4', '', 'E4', 'G4', 'A4', 'C5', 'E5'];
  for (let i = 0; i < BASE_FREQS.length; i++) {
    const freqNorm = (BASE_FREQS[i] - 100) / 800;
    const y = H * 0.15 + (1 - freqNorm) * H * 0.7;
    if (notes[i]) {
      ctx.fillStyle = 'rgba(80,80,100,0.12)';
      ctx.font = '9px Inter';
      ctx.textAlign = 'left';
      ctx.fillText(notes[i], 16, y + 3);

      // Subtle horizontal line
      ctx.beginPath();
      ctx.moveTo(40, y);
      ctx.lineTo(W - 40, y);
      ctx.strokeStyle = 'rgba(40,40,60,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function animate() {
  time++;
  requestAnimationFrame(animate);

  // Gentle fade
  ctx.fillStyle = 'rgba(6,6,15,0.06)';
  ctx.fillRect(0, 0, W, H);

  drawFreqScale();

  // Update all voices
  for (const voice of voices) {
    voice.update(time);
  }

  // Draw consonance lines
  drawConsonanceLines(time);

  // Draw voices
  for (const voice of voices) {
    voice.draw(time);
  }

  // Global waveform at top — sum of all voices
  if (voices.length > 0) {
    const waveW = W * 0.6;
    const startX = W * 0.2;
    const waveY = H * 0.06;
    const samples = 200;

    ctx.beginPath();
    for (let i = 0; i <= samples; i++) {
      const t = (i / samples) * Math.PI * 6;
      let sum = 0;
      for (const voice of voices) {
        sum += Math.sin(t * voice.currentFreq / 100 + voice.phase) / voices.length;
      }
      const x = startX + (i / samples) * waveW;
      const y = waveY + sum * 12;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(200,190,170,0.06)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

// === Events ===
document.getElementById('start-overlay').addEventListener('click', () => {
  if (!started) {
    initAudio();
    started = true;
    document.getElementById('start-overlay').classList.add('hidden');

    // Start with one voice in the center
    setTimeout(() => addVoice(W * 0.5, H * 0.5), 500);
  }
});

let isDragging = false;
let wasDragging = false;
let dragVoice = null;

canvas.addEventListener('click', (e) => {
  if (!started || wasDragging) { wasDragging = false; return; }
  addVoice(e.clientX, e.clientY);
});

canvas.addEventListener('mousedown', (e) => {
  if (!started) return;
  wasDragging = false;
  // Check if near an existing voice
  for (const voice of voices) {
    const dx = e.clientX - voice.x;
    const dy = e.clientY - voice.y;
    if (Math.sqrt(dx * dx + dy * dy) < 30) {
      isDragging = true;
      dragVoice = voice;
      return;
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging && dragVoice) {
    wasDragging = true;
    // Vertical drag shifts pitch
    const freqIndex = Math.floor((1 - e.clientY / H) * BASE_FREQS.length);
    const freq = BASE_FREQS[Math.max(0, Math.min(BASE_FREQS.length - 1, freqIndex))];
    dragVoice.baseFreq = freq;
    dragVoice.targetFreq = freq;
    dragVoice.x = e.clientX;
  }
});

canvas.addEventListener('mouseup', () => {
  if (isDragging && dragVoice) {
    dragVoice.findConsonance();
  }
  isDragging = false;
  dragVoice = null;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  if (!started) return;
  e.preventDefault();
  const touch = e.touches[0];

  for (const voice of voices) {
    const dx = touch.clientX - voice.x;
    const dy = touch.clientY - voice.y;
    if (Math.sqrt(dx * dx + dy * dy) < 40) {
      isDragging = true;
      dragVoice = voice;
      return;
    }
  }

  addVoice(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isDragging && dragVoice) {
    const touch = e.touches[0];
    const freqIndex = Math.floor((1 - touch.clientY / H) * BASE_FREQS.length);
    const freq = BASE_FREQS[Math.max(0, Math.min(BASE_FREQS.length - 1, freqIndex))];
    dragVoice.baseFreq = freq;
    dragVoice.targetFreq = freq;
    dragVoice.x = touch.clientX;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (isDragging && dragVoice) {
    dragVoice.findConsonance();
  }
  isDragging = false;
  dragVoice = null;
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    for (const v of voices) v.remove();
    voices.length = 0;
  }
});

window.addEventListener('resize', resize);

setTimeout(() => {
  document.getElementById('instructions').style.opacity = '0';
}, 12000);

// Init
resize();
animate();
</script>
</body>
</html>
