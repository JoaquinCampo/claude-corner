<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Boundary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: rgba(180,190,220,0.7);
    cursor: crosshair;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(180,190,220,0.2);
    text-shadow: none;
  }
  #instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(140,150,180,0.3);
    white-space: nowrap;
    transition: opacity 2s ease;
  }
  #spectrum-bar {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(to right, #4488cc, #66ddff, #aa66dd, #dd66aa, #ffaa44, #cc4444);
    opacity: 0.5;
  }
  #spectrum-labels {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.35;
  }
  #zone-label {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
    transition: color 0.5s ease;
  }
  .back-link {
    position: fixed; bottom: 24px; left: 28px; z-index: 20;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 2px; text-decoration: none;
    color: rgba(90,90,112,0.15);
    transition: color 0.5s ease;
  }
  .back-link:hover { color: rgba(140,150,180,0.4); }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">The Boundary</div>
  <div id="instructions">move left for order &middot; move right for chaos &middot; the boundary is where beauty lives</div>
  <div id="spectrum-labels"><span>Order</span><span>Chaos</span></div>
  <div id="spectrum-bar"></div>
  <div id="zone-label">The Boundary</div>
</div>

<a class="back-link" href="index.html">Emergence</a>

<script>
try{const v=JSON.parse(localStorage.getItem('emergence-visited')||'{}');v[location.pathname.split('/').pop()]=Date.now();localStorage.setItem('emergence-visited',JSON.stringify(v))}catch(e){}
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const instructionsEl = document.getElementById('instructions');
const zoneLabelEl = document.getElementById('zone-label');

let W, H;
let mouseX = 0.5;
let mouseY = 0.5;
let mouseActive = false;
let time = 0;
const NUM_PARTICLES = 360;
const particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Fade instructions after 10 seconds
setTimeout(() => { instructionsEl.style.opacity = '0'; }, 10000);

// Mouse tracking
window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX / W;
  mouseY = e.clientY / H;
  mouseActive = true;
});

// Touch tracking
window.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX / W;
  mouseY = e.touches[0].clientY / H;
  mouseActive = true;
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX / W;
  mouseY = e.touches[0].clientY / H;
  mouseActive = true;
}, { passive: false });
window.addEventListener('touchend', (e) => {
  e.preventDefault();
  mouseActive = false;
}, { passive: false });

// Space to reset
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    initParticles();
  }
});

// Color utilities
function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
  const br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${bl})`;
}

function getParticleColor(chaos) {
  if (chaos < 0.35) {
    const t = chaos / 0.35;
    return lerpColor('#4488cc', '#66ddff', t);
  } else if (chaos < 0.65) {
    const t = (chaos - 0.35) / 0.3;
    if (t < 0.5) return lerpColor('#66ddff', '#bb66dd', t * 2);
    return lerpColor('#bb66dd', '#dd6688', (t - 0.5) * 2);
  } else {
    const t = (chaos - 0.65) / 0.35;
    return lerpColor('#dd6644', '#ffaa44', t);
  }
}

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.size = 2 + Math.random() * 2;
    this.phase = Math.random() * Math.PI * 2;
    this.orbitRadius = 30 + Math.random() * 60;
    this.orbitSpeed = 0.005 + Math.random() * 0.015;
    this.orbitCenterX = this.x;
    this.orbitCenterY = this.y;
    this.gridX = Math.floor(Math.random() * 20) * (W / 20);
    this.gridY = Math.floor(Math.random() * 12) * (H / 12);
  }

  getChaosLevel() {
    // Boundary zone shifts with mouse
    const shift = (mouseX - 0.5) * 0.3;
    const nx = this.x / W;
    return Math.max(0, Math.min(1, nx + shift));
  }

  update(dt, allParticles, index) {
    const chaos = this.getChaosLevel();
    const t = time;

    // ORDER BEHAVIOR (chaos near 0)
    const orderStrength = Math.max(0, 1 - chaos * 3);
    if (orderStrength > 0) {
      // Orbital / sine wave motion
      const targetX = this.orbitCenterX + Math.cos(t * this.orbitSpeed + this.phase) * this.orbitRadius;
      const targetY = this.orbitCenterY + Math.sin(t * this.orbitSpeed * 1.3 + this.phase) * this.orbitRadius * 0.6;
      this.vx += (targetX - this.x) * 0.02 * orderStrength;
      this.vy += (targetY - this.y) * 0.02 * orderStrength;
    }

    // CHAOS BEHAVIOR (chaos near 1)
    const chaosStrength = Math.max(0, (chaos - 0.65) / 0.35);
    if (chaosStrength > 0) {
      this.vx += (Math.random() - 0.5) * 3 * chaosStrength;
      this.vy += (Math.random() - 0.5) * 3 * chaosStrength;
      // Occasional large jumps
      if (Math.random() < 0.01 * chaosStrength) {
        this.vx += (Math.random() - 0.5) * 12;
        this.vy += (Math.random() - 0.5) * 12;
      }
    }

    // BOUNDARY BEHAVIOR (chaos ~ 0.35–0.65) — emergent flocking
    const boundaryStrength = Math.max(0, 1 - Math.abs(chaos - 0.5) * 4);
    if (boundaryStrength > 0.1) {
      let sepX = 0, sepY = 0, sepCount = 0;
      let aliX = 0, aliY = 0, aliCount = 0;
      let cohX = 0, cohY = 0, cohCount = 0;

      const sepDist = 30;
      const neighborDist = 80;

      // Sample neighbors (not all particles for performance)
      const step = Math.max(1, Math.floor(allParticles.length / 60));
      for (let i = 0; i < allParticles.length; i += step) {
        if (i === index) continue;
        const other = allParticles[i];
        const dx = other.x - this.x;
        const dy = other.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < sepDist && dist > 0) {
          sepX -= dx / dist;
          sepY -= dy / dist;
          sepCount++;
        }
        if (dist < neighborDist) {
          aliX += other.vx;
          aliY += other.vy;
          aliCount++;
          cohX += other.x;
          cohY += other.y;
          cohCount++;
        }
      }

      const boidForce = boundaryStrength * 0.3;
      if (sepCount > 0) {
        this.vx += (sepX / sepCount) * boidForce * 1.5;
        this.vy += (sepY / sepCount) * boidForce * 1.5;
      }
      if (aliCount > 0) {
        this.vx += ((aliX / aliCount) - this.vx) * boidForce * 0.3;
        this.vy += ((aliY / aliCount) - this.vy) * boidForce * 0.3;
      }
      if (cohCount > 0) {
        this.vx += ((cohX / cohCount - this.x)) * boidForce * 0.005;
        this.vy += ((cohY / cohCount - this.y)) * boidForce * 0.005;
      }

      // Spiral / wave tendency — structures that form and dissolve
      const wave = Math.sin(t * 0.0008 + this.x * 0.005 + this.y * 0.003) * boundaryStrength;
      this.vx += Math.cos(t * 0.001 + this.phase) * wave * 0.4;
      this.vy += Math.sin(t * 0.001 + this.phase) * wave * 0.4;
    }

    // Damping
    const damping = 0.96 - chaosStrength * 0.02;
    this.vx *= damping;
    this.vy *= damping;

    // Speed limit
    const maxSpeed = 3 + chaosStrength * 4;
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > maxSpeed) {
      this.vx = (this.vx / speed) * maxSpeed;
      this.vy = (this.vy / speed) * maxSpeed;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Wrap edges
    if (this.x < -20) this.x += W + 40;
    if (this.x > W + 20) this.x -= W + 40;
    if (this.y < -20) this.y += H + 40;
    if (this.y > H + 20) this.y -= H + 40;
  }

  draw(ctx) {
    const chaos = this.getChaosLevel();
    const color = getParticleColor(chaos);
    const boundaryStrength = Math.max(0, 1 - Math.abs(chaos - 0.5) * 4);

    // Glow intensity varies by zone
    const glowSize = this.size * (2 + boundaryStrength * 3);
    const alpha = 0.4 + boundaryStrength * 0.4;

    // Outer glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = color.replace('rgb', 'rgba').replace(')', `,${alpha * 0.15})`);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color.replace('rgb', 'rgba').replace(')', `,${alpha})`);
    ctx.fill();
  }
}

function initParticles() {
  particles.length = 0;
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(new Particle());
  }
}

function updateZoneLabel() {
  const chaos = mouseX;
  let label, color;
  if (chaos < 0.3) {
    label = 'Perfect Order';
    color = '#66ddff';
  } else if (chaos < 0.7) {
    label = 'The Boundary';
    color = '#bb88dd';
  } else {
    label = 'Pure Chaos';
    color = '#ffaa44';
  }
  zoneLabelEl.textContent = label;
  zoneLabelEl.style.color = color;
}

function drawBackground() {
  // Subtle tint based on mouse position
  const orderTint = Math.max(0, 1 - mouseX * 2.5);
  const chaosTint = Math.max(0, (mouseX - 0.6) * 2.5);

  const r = Math.round(10 + chaosTint * 15);
  const g = Math.round(10 + orderTint * 5);
  const b = Math.round(18 + orderTint * 12);

  ctx.fillStyle = `rgba(${r},${g},${b},0.12)`;
  ctx.fillRect(0, 0, W, H);
}

function drawConnections() {
  // Draw faint connections between nearby boundary particles
  const connectionDist = 60;
  const step = Math.max(1, Math.floor(particles.length / 120));

  for (let i = 0; i < particles.length; i += step) {
    const p = particles[i];
    const chaos = p.getChaosLevel();
    const boundaryStrength = Math.max(0, 1 - Math.abs(chaos - 0.5) * 4);
    if (boundaryStrength < 0.3) continue;

    for (let j = i + step; j < particles.length; j += step) {
      const q = particles[j];
      const dx = q.x - p.x;
      const dy = q.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < connectionDist) {
        const qChaos = q.getChaosLevel();
        const qBoundary = Math.max(0, 1 - Math.abs(qChaos - 0.5) * 4);
        if (qBoundary < 0.3) continue;

        const alpha = (1 - dist / connectionDist) * boundaryStrength * qBoundary * 0.08;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(180, 140, 220, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  time++;

  drawBackground();
  drawConnections();

  for (let i = 0; i < particles.length; i++) {
    particles[i].update(1, particles, i);
    particles[i].draw(ctx);
  }

  updateZoneLabel();
  requestAnimationFrame(animate);
}

// Initialize
initParticles();

// Clear canvas fully first frame
ctx.fillStyle = '#06060f';
ctx.fillRect(0, 0, W, H);

animate();
</script>
</body>
</html>
